const EN_KEYS=Object.keys(EN).filter(k=>k.length>1).sort((a,b)=>b.length-a.length);
function trStr(t){
  if(EN[t]!=null)return EN[t];
  let m;
  if(m=t.match(/^(\d+)월$/))return MONTHS_EN[(+m[1]-1)%12];
  if(m=t.match(/^(\d+)일째$/))return m[1]+'d';
  if(m=t.match(/^(\d+)일$/))return m[1]+'d';
  if(m=t.match(/^(\d+)건$/))return m[1];
  return null;
}
function applyLang(){
  const on=(L==='en');
  ['sidebar','view','dw','modal'].forEach(id=>{
    const root=document.getElementById(id);if(!root)return;
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);let n;
    const nodes=[];while(n=w.nextNode())nodes.push(n);
    nodes.forEach(nd=>{
      if(nd.parentElement&&nd.parentElement.closest('.usr'))return; // 사용자 입력은 trUser가 전담
      if(!on){ if(nd._ko!=null){nd.nodeValue=nd._ko;nd._ko=null;} return; }
      const raw=nd.nodeValue, t=raw.trim(); if(!t)return;
      const ex=trStr(t);
      if(ex!=null){ if(nd._ko==null)nd._ko=raw; nd.nodeValue=raw.replace(t,ex); return; }
      let out=raw;
      for(const k of EN_KEYS){ if(out.indexOf(k)>=0) out=out.split(k).join(EN[k]); }
      if(out!==raw){ if(nd._ko==null)nd._ko=raw; nd.nodeValue=out; }
    });
    root.querySelectorAll('[placeholder]').forEach(el=>{
      if(on){ if(!el._kop)el._kop=el.getAttribute('placeholder')||''; let o=el._kop; const r=trStr(o.trim()); if(r!=null)o=r; else for(const k of EN_KEYS){ if(o.indexOf(k)>=0)o=o.split(k).join(EN[k]); } el.setAttribute('placeholder',o); }
      else if(el._kop!=null){ el.setAttribute('placeholder',el._kop); el._kop=null; }
    });
  });
  const bk=document.getElementById('lang-ko'),be=document.getElementById('lang-en');
  if(bk&&be){bk.style.background=on?'rgba(255,255,255,.04)':'rgba(255,255,255,.12)';bk.style.color=on?'#94a3b8':'#fff';be.style.background=on?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';be.style.color=on?'#fff':'#94a3b8';}
}

function toast(m){if(L==='en'){if(EN[m]!=null)m=EN[m];else{for(const k of EN_KEYS){if(m.indexOf(k)>=0)m=m.split(k).join(EN[k]);}}}const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// ── 사용자 입력 자동 번역 (영↔한, MyMemory) ──
var _trCache={};try{_trCache=JSON.parse(localStorage.getItem('us_trcache')||'{}');}catch(e){}
function _trSave(){try{localStorage.setItem('us_trcache',JSON.stringify(_trCache));}catch(e){}}
function trUser(t){
  t=(t==null?'':String(t));
  if(!t.trim())return esc(t);
  var need = (typeof L!=='undefined'&&L==='ko') ? (/[A-Za-z]/.test(t)&&!/[\uac00-\ud7a3]/.test(t)) : (typeof L!=='undefined'&&L==='en' ? /[\uac00-\ud7a3]/.test(t) : false);
  if(!need)return esc(t);
  var key=L+'|'+t;
  if(_trCache[key]!=null)return '<span class="usr" title="'+esc(t)+'">'+esc(_trCache[key])+'</span>';
  return '<span class="usr utr" data-k="'+esc(key)+'" data-s="'+esc(t)+'" title="'+esc(t)+'">'+esc(t)+'</span>';
}
var _trBusy=false;
async function applyUserTr(){
  var swap=function(){[].slice.call(document.querySelectorAll('.utr[data-k]')).forEach(function(e){var k=e.getAttribute('data-k');if(_trCache[k]!=null){e.textContent=_trCache[k];e.classList.remove('utr');}});};
  swap();
  if(_trBusy)return;
  var els=[].slice.call(document.querySelectorAll('.utr[data-k]'));
  var uniq={};els.forEach(function(e){var k=e.getAttribute('data-k');if(_trCache[k]==null)uniq[k]=e.getAttribute('data-s');});
  var keys=Object.keys(uniq);if(!keys.length)return;
  _trBusy=true;
  var lp=(L==='ko')?'en|ko':'ko|en';
  for(var i=0;i<keys.length;i++){
    var srcTxt=uniq[keys[i]];
    try{
      var r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(srcTxt)+'&langpair='+lp);
      var j=await r.json();
      var tr=(j&&j.responseData&&j.responseData.translatedText)||srcTxt;
      if(/MYMEMORY|INVALID EMAIL|QUERY LENGTH/i.test(tr))tr=srcTxt;
      _trCache[keys[i]]=tr;
    }catch(e){_trCache[keys[i]]=srcTxt;}
  }
  _trSave();_trBusy=false;swap();
}
function today(){return new Date().toISOString().slice(0,10);}
function ym(d){return String(d||'').slice(0,7);}
function curYm(){return today().slice(0,7);}
function curYr(){return today().slice(0,4);}
function fm(n){n=Number(n)||0;return SYM+Math.round(n).toLocaleString();}
function fmS(n){n=Number(n)||0;const a=Math.abs(n);if(a>=1e6)return SYM+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(a>=1e3)return SYM+(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';return SYM+Math.round(n).toLocaleString();}
function fkrw(n){const w=(Number(n)||0)*(D.rate||0);if(!w)return'';const a=Math.abs(w);if(a>=1e8)return'₩'+(w/1e8).toFixed(1)+'억';if(a>=1e4)return'₩'+Math.round(w/1e4).toLocaleString()+'만';return'₩'+Math.round(w).toLocaleString();}
function monthsOf(arr,f){const s=new Set(arr.map(x=>ym(x[f||'date'])).filter(Boolean));return[...s].sort().reverse();}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function pct(n,d){return d>0?n/d*100:0;}
function barPct(v,mx){return mx>0?Math.max(4,Math.pow(Math.max(0,v)/mx,0.55)*100):4;}
function ordChip(s){return `<span class="chip ${ORD_ST[s]||'c-gray'}">${esc(s)}</span>`;}
function clientList(){return [...new Set([].concat((D.sales||[]).map(s=>s.client),(D.orders||[]).map(o=>o.client),(D.deals||[]).map(d=>d.client),(D.clients||[]).map(c=>c.name)).filter(Boolean))].sort();}
function dlist(){return '<datalist id="dl-clients">'+clientList().map(c=>'<option value="'+esc(c)+'">').join('')+'</datalist>';}

// ── 집계 (매출인식 기준 = sales.date / 수금 = collections.date) ──
function colSum(s){return (s.collections||[]).reduce((a,c)=>a+(+c.amt||0),0);}
function outAmt(s){return Math.max(0,(+s.amt||0)-colSum(s));}
function salesMonthly(yr){const m={};(D.sales||[]).forEach(s=>{const d=String(s.date||'');if(d.slice(0,4)!==yr)return;const k=+d.slice(5,7);m[k]=(m[k]||0)+(+s.amt||0);});return m;}
function payMonthly(yr){const m={};(D.sales||[]).forEach(s=>(s.collections||[]).forEach(c=>{const d=String(c.date||'');if(d.slice(0,4)!==yr)return;const k=+d.slice(5,7);m[k]=(m[k]||0)+(+c.amt||0);}));return m;}
function tgtMonthly(yr){const m={};Object.keys(D.targets||{}).forEach(k=>{if(k.slice(0,4)===yr)m[+k.slice(5,7)]=+D.targets[k]||0;});return m;}
function ytd(m,uptoM){let s=0;for(let i=1;i<=uptoM;i++)s+=m[i]||0;return s;}
function totalOut(){return (D.sales||[]).reduce((a,s)=>a+outAmt(s),0);}
function agingBucket(s){const o=outAmt(s);if(o<=0)return null;const d=daysBetween(s.date||today(),today());return d>=90?'90+':d>=60?'60+':d>=30?'30+':'30내';}
function fundsBalAcc(name){const acc=(D.accounts||[]).find(a=>a.name===name);let b=acc?(+acc.opening||0):0;(D.funds||[]).forEach(f=>{if((f.account||'주거래계좌')!==name)return;b+=(f.kind==='입금'?1:-1)*(+f.amt||0);});return b;}
function fundsBal(){return (D.accounts||[]).reduce((a,x)=>a+fundsBalAcc(x.name),0);}
function itemQty(name){const it=(D.items||[]).find(i=>i.name===name);let q=it?(+it.qty0||0):0;(D.moves||[]).forEach(m=>{if(m.item===name)q+=(m.type==='입고'?1:-1)*(+m.qty||0);});return q;}

window.addEventListener('popstate',function(){var v=(location.hash||'').replace('#','');setView(VIEWS_KEYS.indexOf(v)>=0?v:'dash',true);});
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mob-ov').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-ov').classList.remove('show');}
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>{setView(a.dataset.v);closeSidebar();}));
function render(){if(curView==='perf'&&!_canPerf)curView='dash';if(curView==='hq'&&!_canHQ)curView='dash';const f={dash:vDash,hq:vHQ,report:vReport,perf:vPerf,sched:vSched,pipe:vPipe,accounts:vAccounts,acts:vActs,sales:vSales,ar:vAR,orders:vOrders,clients:vClients,psi:vPsi,inv:vInv,asset:vAsset,funds:vFunds}[curView];document.getElementById('view').innerHTML=f();if(curView==='pipe')bindKb();applyLang();applyUserTr();}
function head(t,d,acts){return `<div class="topbar"><div><h2>${t}</h2><div class="desc">${d}</div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${acts||''}</div></div><div class="wrap">`;}
function isEmpty(){return !(D.sales||[]).length&&!(D.orders||[]).length&&!(D.funds||[]).length&&!(D.items||[]).length;}

// ── 조회 기간 엔진 (프리셋 칩 + 직접설정) — 대시보드·리포트 공용 ──
let PQ=null;
function _mEnd(ym){var y=+ym.slice(0,4),m=+ym.slice(5,7);return ym+'-'+String(new Date(y,m,0).getDate()).padStart(2,'0');}
function pqInit(){if(!PQ){var y=+curYr();PQ={from:y+'-01-01',to:y+'-12-31',label:jt(y+'년',''+y),preset:'thisYear'};}return PQ;}
function pqPreset(t){var n=today(),y=+n.slice(0,4),m=+n.slice(5,7),ym=n.slice(0,7);
  if(t==='thisMonth')PQ={from:ym+'-01',to:_mEnd(ym),label:jt(y+'년 '+m+'월',MONTHS_EN[m-1]+' '+y),preset:t};
  else if(t==='lastMonth'){var p=prevYm(ym);PQ={from:p+'-01',to:_mEnd(p),label:jt((+p.slice(0,4))+'년 '+(+p.slice(5,7))+'월',MONTHS_EN[+p.slice(5,7)-1]+' '+p.slice(0,4)),preset:t};}
  else if(t==='thisQ'){var q=Math.ceil(m/3),a=(q-1)*3+1,b=q*3;PQ={from:y+'-'+String(a).padStart(2,'0')+'-01',to:_mEnd(y+'-'+String(b).padStart(2,'0')),label:jt(y+'년 '+q+'분기',y+' Q'+q),preset:t};}
  else if(t==='thisYear')PQ={from:y+'-01-01',to:y+'-12-31',label:jt(y+'년',''+y),preset:t};
  else if(t==='lastYear')PQ={from:(y-1)+'-01-01',to:(y-1)+'-12-31',label:jt((y-1)+'년',''+(y-1)),preset:t};
  else if(t==='last12'){var d=new Date(y,m-12,1);var fy=d.getFullYear(),fm=d.getMonth()+1;PQ={from:fy+'-'+String(fm).padStart(2,'0')+'-01',to:_mEnd(ym),label:jt('최근 12개월','Last 12mo'),preset:t};}
  else if(t==='custom'){pqInit();PQ.preset='custom';}
  render();}
function pqCustom(){var f=document.getElementById('pq-from').value,t=document.getElementById('pq-to').value;
  if(f)PQ.from=f+'-01';if(t)PQ.to=_mEnd(t);
  if(PQ.to<PQ.from){var x=PQ.from;PQ.from=PQ.to.slice(0,7)+'-01';PQ.to=_mEnd(x.slice(0,7));}
  PQ.preset='custom';PQ.label=PQ.from.slice(0,7)+' ~ '+PQ.to.slice(0,7);render();}
function pqCtrl(){pqInit();
  var chips=[['thisMonth','이번달','This mo.'],['lastMonth','지난달','Last mo.'],['thisQ','이번 분기','This Q'],['thisYear','올해','This yr'],['lastYear','작년','Last yr'],['last12','최근 12개월','Last 12mo'],['custom','직접설정','Custom']];
  var h='<span style="display:inline-flex;gap:4px;flex-wrap:wrap;align-items:center">'+chips.map(function(c){return '<button class="pqchip'+(PQ.preset===c[0]?' on':'')+'" onclick="pqPreset(\''+c[0]+'\')">'+jt(c[1],c[2])+'</button>';}).join('')+'</span>';
  if(PQ.preset==='custom')h+='<span style="display:inline-flex;gap:5px;align-items:center;margin-left:6px;padding-left:8px;border-left:1px solid var(--line)"><input type="month" id="pq-from" value="'+PQ.from.slice(0,7)+'" max="'+PQ.to.slice(0,7)+'" onchange="pqCustom()" class="sel" style="padding:5px 8px"><span class="muted">~</span><input type="month" id="pq-to" value="'+PQ.to.slice(0,7)+'" onchange="pqCustom()" class="sel" style="padding:5px 8px"></span>';
  return h;}
function pqSales(){pqInit();return (D.sales||[]).filter(function(s){return _inR(s.date,PQ.from,PQ.to);});}
function pqPayIn(from,to){var p=0;(D.sales||[]).forEach(function(s){(s.collections||[]).forEach(function(c){if(_inR(c.date,from,to))p+=+c.amt||0;});});return p;}
function pqTargetSum(from,to){var s=0,f=from.slice(0,7),t=to.slice(0,7);Object.keys(D.targets||{}).forEach(function(k){if(k>=f&&k<=t)s+=+D.targets[k]||0;});return s;}
function pqPrev(){var f=new Date(PQ.from),t=new Date(PQ.to),days=Math.round((t-f)/86400000);var pt=new Date(f.getTime()-86400000),pf=new Date(pt.getTime()-days*86400000);return {from:pf.toISOString().slice(0,10),to:pt.toISOString().slice(0,10)};}

// ── 대시보드 ──
function vDash(){
  pqInit();

  // 시점값 (기간 무관)
  const out=totalOut(), bal=fundsBal();
  const backlog=(D.orders||[]).filter(o=>o.status!=='납품완료'&&o.status!=='취소');
  const backAmt=backlog.reduce((a,o)=>a+(+o.amt||0),0);

      <div class="hs" style="margin-top:8px">${jt('목표 달성률','Target')} <b style="color:${gcol}">${yTgt?achv.toFixed(1)+'%':jt('목표 미설정','no target')}</b>${yTgt?' <span style="color:#64748b">('+jt('목표','tgt')+' '+fm(yTgt)+')</span>':''}</div>

    <div class="divv"><div class="hl">${jt('수금 (기간)','Collections')}</div><div class="hv" style="font-size:24px">${fm(yPay)}</div>

      <div class="hs">${fkrw(out)}</div></div>

      <div class="hs">${fkrw(bal)}</div>

  const mx=Math.max(1,...Array.from({length:12},(_,i)=>Math.max(sm[i+1]||0,pm[i+1]||0,tm[i+1]||0)));

    return `<div class="mcol" style="cursor:pointer" onclick="PQ={from:'${yr}-${String(m).padStart(2,'0')}-01',to:_mEnd('${yr}-${String(m).padStart(2,'0')}'),label:'${yr}년 ${m}월',preset:'custom'};setView('report')" title="${jt('클릭 → 이 달 리포트','Click → month report')}"><div class="bars">${tv?`<div class="tgt" style="bottom:${barPct(tv,mx)}%"></div>`:''}

  const byC={};(D.sales||[]).forEach(s=>{const o=outAmt(s);if(o>0&&s.client)byC[s.client]=(byC[s.client]||0)+o;});

  return head('📊 '+jt('대시보드','Dashboard'),jt('미국법인 경영 현황','WONTECH USA overview')+` · ${SYM}1=₩${(D.rate||0).toLocaleString()} · ${jt('기준','as of')} ${today()}`,
    `<button class="btn btn-sm" onclick="mTargets()"><i class="bi bi-bullseye"></i> ${jt('목표','Targets')}</button><button class="btn btn-sm" onclick="setRate()"><i class="bi bi-currency-exchange"></i> ${jt('환율','FX')}</button>${isEmpty()?'<button class="btn btn-primary" onclick="seedSample(true)">'+jt('샘플 데이터 넣기','Load sample')+'</button>':''}`)

// ── 물류·재고 ──
let fInvFilter='';
function vInv(){
  var items=(D.items||[]);
  var low=items.filter(function(i){return itemQty(i.name)<(+i.safety||0);});
  var cm=curYm();var inM=0,outM=0;(D.moves||[]).forEach(function(m){if(ym(m.date)===cm){if(m.type==='입고')inM+=+m.qty||0;else outM+=+m.qty||0;}});
  var cardItems=fInvFilter==='low'?low:items;
  var cards=cardItems.length?cardItems.map(function(i){var q=itemQty(i.name);var sf=+i.safety||0;var lo=q<sf;var ratio=sf?Math.min(100,q/sf*100):100;var col=lo?'#dc2626':q<sf*1.3?'#f59e0b':'#16a34a';
    return '<div class="ccard" onclick="openItem(\''+i.id+'\')">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px"><div style="flex:1;min-width:0"><div style="font-weight:700;color:var(--ink);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+trUser(i.name)+'</div><div style="font-size:11px;color:var(--muted)">📍 '+(i.loc?trUser(i.loc):'-')+'</div></div>'+(lo?'<span class="chip c-red" style="font-size:10px;flex-shrink:0">'+jt('부족','LOW')+'</span>':'<span class="chip c-green" style="font-size:10px;flex-shrink:0">'+jt('정상','OK')+'</span>')+'</div>'
      +'<div style="margin-top:11px;display:flex;align-items:baseline;gap:5px"><b style="font-size:25px;color:'+col+';line-height:1">'+q.toLocaleString()+'</b><span class="muted" style="font-size:12px">'+trUser(i.unit)+'</span></div>'
      +'<div class="bar" style="margin-top:9px;height:8px;background:#f1f5f9"><i style="width:'+ratio+'%;background:'+col+'"></i></div>'
      +'<div style="font-size:10.5px;color:var(--muted);margin-top:4px">'+jt('안전재고','safety')+' '+sf.toLocaleString()+trUser(i.unit)+'</div></div>';
  }).join(''):'<div class="card"><div class="empty">'+jt('품목이 없습니다','No items')+'</div></div>';
  var movesAll=(D.moves||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var mv=fInvFilter==='in'?movesAll.filter(function(m){return m.type==='입고'&&ym(m.date)===cm;})
    :fInvFilter==='out'?movesAll.filter(function(m){return m.type==='출고'&&ym(m.date)===cm;})
    :movesAll.slice(0,40);
  var mRows=mv.length?mv.map(function(m){return `<tr onclick="mMove('${m.id}')"><td class="l">${m.date}</td><td class="l">${m.type==='입고'?'<span class="chip c-green"><i class="bi bi-box-arrow-in-down"></i> '+jt('입고','IN')+'</span>':'<span class="chip c-amber"><i class="bi bi-box-arrow-up"></i> '+jt('출고','OUT')+'</span>'}</td><td class="l"><b style="color:var(--ink)">${trUser(m.item)}</b></td><td><b>${(+m.qty||0).toLocaleString()}</b></td><td class="l muted">${trUser(m.ref)}</td></tr>`;}).join(''):'<tr><td colspan="5" class="empty">'+jt('입출고 이력 없음','No movements')+'</td></tr>';
  return head('📦 '+jt('물류 · 재고','Inventory'), jt('품목 = 취급 제품 목록 · 입출고 = 재고 이동 이력 · 품목 클릭 → 이력·입출고','Items = product master · Moves = stock in/out · click an item for history'),
    `<button class="btn" onclick="setView('psi')">📊 ${jt('PSI 보기','View PSI')}</button><button class="btn" onclick="mItem()">+ ${jt('품목','Item')}</button><button class="btn" style="color:#15803d;font-weight:700" onclick="mMove(null,{type:'입고'})">📥 ${jt('입고','Receive')}</button><button class="btn btn-primary" onclick="mMove(null,{type:'출고'})">📤 ${jt('출고','Ship')}</button>`)
    +`<div class="grid actkpi" style="grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
      <div class="statcard${fInvFilter===''?' on':''}" style="border-top:3px solid #4f46e5" onclick="fInvFilter='';render()"><div class="sv">${items.length}</div><div class="sl">${jt('등록 품목','Items')}</div></div>
      <div class="statcard${fInvFilter==='low'?' on':''}" style="border-top:3px solid #dc2626" onclick="fInvFilter=fInvFilter==='low'?'':'low';render()"><div class="sv" style="color:${low.length?'var(--bad)':'var(--ink)'}">${low.length}</div><div class="sl">${jt('안전재고 미달','Low stock')}</div></div>
      <div class="statcard${fInvFilter==='in'?' on':''}" style="border-top:3px solid #16a34a" onclick="fInvFilter=fInvFilter==='in'?'':'in';render()"><div class="sv" style="color:var(--ok)">+${inM.toLocaleString()}</div><div class="sl">${jt('이번달 입고','IN this mo.')}</div></div>
      <div class="statcard${fInvFilter==='out'?' on':''}" style="border-top:3px solid #f59e0b" onclick="fInvFilter=fInvFilter==='out'?'':'out';render()"><div class="sv" style="color:var(--warn)">-${outM.toLocaleString()}</div><div class="sl">${jt('이번달 출고','OUT this mo.')}</div></div></div>
    ${_shipSection()}
    <div class="sect" style="margin-bottom:10px"><span>📦 ${jt('품목별 재고','Stock by Item')}</span></div>
    <div class="cgrid" style="margin-bottom:18px">${cards}</div>
    <div class="card" style="padding:0;overflow:auto"><div class="sect" style="padding:15px 18px 4px"><span>🚚 ${jt('입출고 이력','Movements')} <span class="muted" style="font-weight:500;font-size:11px">${(fInvFilter==='in'||fInvFilter==='out')?jt('이번달만','this month'):jt('최근 40건','last 40')}</span></span></div><table><thead><tr><th class="l">${jt('날짜','Date')}</th><th class="l">${jt('구분','Type')}</th><th class="l">${jt('품목','Item')}</th><th>${jt('수량','Qty')}</th><th class="l">${jt('참조','Ref')}</th></tr></thead><tbody>${mRows}</tbody></table></div></div>`;
}
function mItem(id){const it=id?(D.items||[]).find(x=>x.id===id):{name:'',unit:'개',qty0:'',safety:'',loc:''};
  openM(id?'품목 수정':'품목 추가',
    `<div class="fld"><label>품목명</label><input id="f-name" value="${esc(it.name)}"></div>
    <div class="fr3"><div class="fld"><label>기초 수량</label><input id="f-q0" type="number" value="${it.qty0||''}"></div><div class="fld"><label>단위</label><input id="f-unit" value="${esc(it.unit||'개')}"></div><div class="fld"><label>안전재고</label><input id="f-safe" type="number" value="${it.safety||''}"></div></div>
    <div class="fld"><label>보관 위치</label><input id="f-loc" value="${esc(it.loc||'')}"></div>`,
    async()=>{const g=x=>document.getElementById(x).value;const rec={id:id||uid(),name:g('f-name').trim(),qty0:Number(g('f-q0'))||0,unit:g('f-unit').trim(),safety:Number(g('f-safe'))||0,loc:g('f-loc').trim()};
      if(!rec.name){toast('품목명을 입력하세요');return false;}
      const i=(D.items||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.items[i]=rec;else D.items.push(rec);return await saveAll();},
    id?async()=>{D.items=D.items.filter(x=>x.id!==id);await saveAll('삭제됨');}:null);
}
function mMove(id,preset){preset=preset||{};
  var m=id?(D.moves||[]).find(x=>x.id===id):{date:today(),type:preset.type||'입고',item:preset.item||'',qty:'',ref:'',serial:'',client:''};
  var opts='<option value="">'+jt('선택…','Select…')+'</option>'+(D.items||[]).map(function(i){return '<option '+(m.item===i.name?'selected':'')+'>'+esc(i.name)+'</option>';}).join('');
  var cliOpts='<option value="">'+jt('선택…','—')+'</option>'+(D.clients||[]).map(function(c){return '<option '+(m.client===c.name?'selected':'')+'>'+esc(c.name)+'</option>';}).join('');
  var title=id?jt('입출고 수정','Edit Move'):(m.type==='출고'?jt('📤 출고 등록','📤 New Shipment'):jt('📥 입고 등록','📥 New Receipt'));
  openM(title,
    `<div class="fr"><div class="fld"><label>${jt('날짜','Date')}</label><input id="f-date" type="date" value="${m.date||today()}"></div><div class="fld"><label>${jt('구분','Type')}</label><select id="f-type" onchange="_mvSwitch()"><option ${m.type==='입고'?'selected':''}>입고</option><option ${m.type==='출고'?'selected':''}>출고</option></select></div></div>
    <div class="fr"><div class="fld"><label>${jt('품목','Item')}</label><select id="f-item" onchange="_mvSwitch()">${opts}</select></div><div class="fld"><label>${jt('수량','Qty')}</label><input id="f-qty" type="number" oninput="_mvHint()" value="${m.qty||''}"></div></div>
    <div id="mv-hint" style="margin:-2px 0 10px"></div>
    <div class="fld" id="out-cli" style="display:none"><label>${jt('고객사 (출고처)','Client (ship-to)')}</label><select id="f-client">${cliOpts}</select></div>
    <div id="ser-pick"></div>
    <div class="fld"><label>${jt('참조 (선적번호 / 사유)','Ref (shipment / reason)')}</label><input id="f-ref" value="${esc(m.ref||'')}" placeholder="${jt('예: 선적 SH-2607 / 설치','e.g. SH-2607 / install')}"></div>`,
    async()=>{const g=x=>{var e=document.getElementById(x);return e?e.value:'';};
      const rec={id:id||uid(),date:g('f-date'),type:g('f-type'),item:g('f-item'),qty:Number(g('f-qty'))||0,ref:g('f-ref').trim(),serial:'',client:''};
      if(!rec.item){toast(jt('품목을 선택하세요','Select an item'));return false;}
      var checked=[].slice.call(document.querySelectorAll('.serck:checked')).map(function(x){return x.value;});
      if(rec.type==='출고'){rec.client=g('f-client');if(checked.length){rec.serial=checked.join(', ');rec.qty=checked.length;}}
      else{rec.serial=(g('f-serial')||'').trim();}
      if(!rec.qty){toast(jt('수량을 입력하세요','Enter quantity'));return false;}
      if(rec.type==='출고'){var curQ=itemQty(rec.item)+(id&&m.type==='출고'&&m.item===rec.item?(+m.qty||0):0);
        if(curQ-rec.qty<0){if(!confirm(jt('현재고가 '+curQ+'개인데 '+rec.qty+'개 출고하면 재고가 '+(curQ-rec.qty)+'개(마이너스)가 됩니다. 그래도 등록할까요?','Current stock is '+curQ+', shipping '+rec.qty+' makes it '+(curQ-rec.qty)+' (negative). Proceed?')))return false;}}
      const i=(D.moves||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.moves[i]=rec;else D.moves.push(rec);
      if(!id){if(rec.type==='입고'&&rec.serial)_ingestSerials(rec.item,rec.serial,rec.date,rec.ref);
        if(rec.type==='출고'&&checked.length)_shipSerials(checked,rec.client,rec.date,rec.ref);}
      return await saveAll();},
    id?async()=>{D.moves=D.moves.filter(x=>x.id!==id);await saveAll(jt('삭제됨','Deleted'));}:null);
  setTimeout(_mvSwitch,30);
}
function _mvSwitch(){_renderPicker();_mvHint();}
function _renderPicker(){
  var g=function(x){var e=document.getElementById(x);return e?e.value:'';};
  var type=g('f-type'),item=g('f-item');
  var cr=document.getElementById('out-cli');if(cr)cr.style.display=(type==='출고')?'':'none';
  var pk=document.getElementById('ser-pick');if(!pk)return;
  if(type==='입고'){
    pk.innerHTML='<div class="fld"><label>'+jt('시리얼 / 로트번호 (장비 입고 시, 쉼표 구분)','Serial / Lot (equipment, comma-sep)')+'</label><input id="f-serial" placeholder="'+jt('예: WT-OX-24001, WT-OX-24002','e.g. WT-OX-24001, ...')+'"><div class="muted" style="font-size:10.5px;margin-top:3px">'+jt('입력한 시리얼은 장비 이력에 개별 등록됩니다','Each serial is auto-registered in Equipment Registry')+'</div></div>';
  } else {

    if(!units.length){pk.innerHTML='<div class="muted" style="font-size:11.5px;padding:3px 2px">'+jt('창고에 시리얼 관리 재고가 없습니다 — 수량만 입력하세요','No serialized units in stock — enter qty only')+'</div>';return;}
    pk.innerHTML='<div class="fld"><label>'+jt('출고할 장비 선택','Select units to ship')+' <span class="muted" style="font-weight:500">('+jt('창고 재고 '+units.length+'대','in stock '+units.length)+')</span></label><div style="max-height:150px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:5px 7px">'+units.map(function(u){return '<label style="display:flex;gap:8px;align-items:center;padding:4px 2px;font-size:12.5px;cursor:pointer;border-bottom:1px dashed var(--line)"><input type="checkbox" class="serck" value="'+esc(u.serial)+'" onchange="_pickCount()"><b style="flex:1">🔖 '+esc(u.serial)+'</b><span class="muted" style="font-size:10.5px">'+(u.inDate||'')+(u.shipRef?' · '+esc(u.shipRef):'')+'</span></label>';}).join('')+'</div></div>';
  }
}
function _pickCount(){var n=document.querySelectorAll('.serck:checked').length;var q=document.getElementById('f-qty');if(q)q.value=n;_mvHint();}
function _ingestSerials(item,serialStr,dateStr,refStr){
  if(!serialStr)return;D.equipment=D.equipment||[];
  serialStr.split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(sn){
    if(D.equipment.some(function(e){return e.serial===sn;}))return;
    D.equipment.push({id:uid(),serial:sn,item:item,status:'재고',client:'',inDate:dateStr||today(),shipRef:refStr||'',outDate:'',outRef:'',note:'',events:[{date:dateStr||today(),type:'입고',detail:refStr||''}]});});
}
function _shipSerials(serials,client,dateStr,refStr){
  (serials||[]).forEach(function(sn){var e=(D.equipment||[]).find(function(x){return x.serial===sn;});
    if(e){e.status='출고';e.client=client||'';e.outDate=dateStr||today();e.outRef=refStr||'';(e.events=e.events||[]).push({date:dateStr||today(),type:'출고',detail:(client||'')+(refStr?' · '+refStr:'')});}});
}
function _mvHint(){
  var g=function(x){var e=document.getElementById(x);return e?e.value:'';};
  var h=document.getElementById('mv-hint');if(!h)return;
  var type=g('f-type'),item=g('f-item'),qtyIn=Number(g('f-qty'))||0;
  if(!item){h.innerHTML='<div style="font-size:11.5px;color:var(--muted);padding:2px 2px">'+jt('품목을 선택하면 현재고가 표시됩니다','Pick an item to see current stock')+'</div>';return;}
  var q=itemQty(item),it=(D.items||[]).find(x=>x.name===item),unit=it?trUser(it.unit):'';
  if(type==='출고'){
    var after=q-qtyIn;
    var lastIn=(D.moves||[]).filter(m=>m.item===item&&m.type==='입고').sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,3);
    h.innerHTML='<div style="background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12px">'

  const thisYm=curYm();
  const cols=stages.map(st=>{
    const c=DEAL_ST[st];
    const ds=ALL.filter(d=>d.stage===st).sort((a,b)=>(b.amt||0)-(a.amt||0));

      const daysBadge=`<span class="days" style="background:${staleDanger?'#dc2626':staleWarn?'#f59e0b':'#e5e7eb'};color:${staleDanger||staleWarn?'#fff':'#6b7280'}">${days}일째</span>`;
      const closingThis=d.expected&&d.expected.slice(0,7)===thisYm&&!isWon;
      const overdue=d.expected&&d.expected<today()&&!isWon;
      return `<div class="kcard" draggable="true" data-id="${d.id}" onclick="openDeal('${d.id}')" style="border-left:3px solid ${c}${closingThis?';box-shadow:0 0 0 2px #f59e0b40':overdue?';box-shadow:0 0 0 2px #dc262640':''}">

      </div>`;}).join('');
    return `<div class="kbcol" data-st="${st}">
      <div class="kbhead" style="background:${isWon?'#f0fdf4':'#f8faff'};border-left:3px solid ${c}">
        <div class="r1"><span class="nm" style="color:${c}">${st}</span><span class="cnt" style="background:${c}">${ds.length}</span></div>

let schMode='today', schRef=new Date();
const SCH_KIND={'할일':{c:'#4f46e5',i:'✅',en:'Task'},'딜':{c:'#7c3aed',i:'🎯',en:'Deal action'},'후속':{c:'#ea580c',i:'📞',en:'Follow-up'},'납기':{c:'#0891b2',i:'🚚',en:'Order ETA'}};
function schWeekDays(ref){const x=new Date(ref);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);const a=[];for(let i=0;i<7;i++){const d=new Date(x);d.setDate(d.getDate()+i);a.push(d);}return a;}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function schItems(){
  const out=[];
  (D.tasks||[]).forEach(t=>{if(t.date)out.push({date:t.date,time:t.time||'',kind:'할일',title:t.title,owner:t.owner||'',done:!!t.done,ref:'task',id:t.id});});
  (D.deals||[]).filter(d=>DEAL_OPEN.includes(d.stage)&&d.next&&d.nextDate).forEach(d=>out.push({date:d.nextDate,time:'',kind:'딜',title:d.client+' · '+d.next,owner:d.owner||'',done:false,ref:'deal',id:d.id}));

  return out;
}
function schClick2(ref,id){if(ref==='task'){const t=(D.tasks||[]).find(x=>x.id===id);if(t&&t.dealId)return openDeal(t.dealId);return mTask(id);}if(ref==='deal')return openDeal(id);if(ref==='act')return setView('acts');if(ref==='order')return mOrder(id);}
async function toggleTask(id){const t=(D.tasks||[]).find(x=>x.id===id);if(!t)return;t.done=!t.done;await saveAll(t.done?jt('완료','Done'):jt('해제','Reopened'));}
function schCard(it){const k=SCH_KIND[it.kind];const overdue=it.date<today()&&!it.done;

      <span class="chip" style="background:${k.c}22;color:${k.c};font-size:10px">${k.i} ${jt(it.kind,k.en)}</span>${it.time?`<span class="muted" style="font-size:11px">${it.time}</span>`:''}${overdue?`<span class="chip c-red" style="font-size:9.5px">${jt('지연','late')}</span>`:''}</div>

function schNav(delta){if(schMode==='week')schRef.setDate(schRef.getDate()+delta*7);else schRef.setMonth(schRef.getMonth()+delta);schRef=new Date(schRef);render();}

function schWeek(){

function schMonth(){

// ── 전역 검색 ──
function openSearch(){closeSidebar();
  document.getElementById('modal').innerHTML='<div class="mh" style="gap:8px"><i class="bi bi-search" style="color:var(--muted)"></i><input id="gq" placeholder="'+jt('거래처·딜·활동·매출 검색','Search clients, deals, activities…')+'" oninput="gSearch()" onkeydown="if(event.key===\'Enter\'){var f=document.querySelector(\'#gres [data-go]\');if(f)f.click();}" style="border:0;font-size:15.5px;flex:1;outline:none;background:transparent;color:var(--ink)"><button class="x" onclick="closeM()">×</button></div><div class="mb" id="gres" style="min-height:120px;max-height:60vh;overflow:auto"><div class="empty">'+jt('검색어를 입력하세요','Type to search')+'</div></div>';
  document.getElementById('mbg').style.display='flex';
  setTimeout(function(){var g=document.getElementById('gq');if(g)g.focus();},60);}
function _srow(ic,title,sub,go){return '<div data-go="1" onclick="'+go+'" style="display:flex;gap:10px;align-items:center;padding:8px 7px;border-radius:8px;cursor:pointer" onmouseover="this.style.background=\'#f4f6fb\'" onmouseout="this.style.background=\'\'"><span>'+ic+'</span><div style="flex:1;min-width:0"><div style="font-weight:600;color:var(--ink);font-size:13px">'+esc(title)+'</div>'+(sub?'<div class="muted" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sub)+'</div>':'')+'</div><i class="bi bi-arrow-return-left" style="color:#cbd5e1;font-size:11px"></i></div>';}
function _sgrp(t,rows){return '<div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 3px">'+t+'</div>'+rows.join('');}
function gSearch(){
  var q=(document.getElementById('gq').value||'').trim().toLowerCase();var res=document.getElementById('gres');
  if(!q){res.innerHTML='<div class="empty">'+jt('검색어를 입력하세요','Type to search')+'</div>';return;}
  var out='',esq=function(c){return esc(c).replace(/'/g,"&#39;");};
  var cls=clientList().filter(function(c){return c.toLowerCase().indexOf(q)>=0;}).slice(0,6);
  if(cls.length)out+=_sgrp(jt('거래처','Clients'),cls.map(function(c){return _srow('🏢',c,'',"openClient('"+esq(c)+"');closeM()");}));
  var dl=(D.deals||[]).filter(function(d){return ((d.client||'')+' '+(d.product||'')).toLowerCase().indexOf(q)>=0;}).slice(0,6);
  if(dl.length)out+=_sgrp(jt('딜','Deals'),dl.map(function(d){return _srow('🎯',d.client,(d.product||'')+' · '+fm(d.amt)+' · '+jt(d.stage,EN[d.stage]||d.stage),"openDeal('"+d.id+"');closeM()");}));
  var sl=(D.sales||[]).filter(function(s){return ((s.client||'')+' '+(s.product||'')).toLowerCase().indexOf(q)>=0;}).slice(0,5);
  if(sl.length)out+=_sgrp(jt('매출','Sales'),sl.map(function(s){return _srow('🧾',s.client,s.date+' · '+(s.product||'')+' · '+fm(s.amt),"dwSale('"+s.id+"');closeM()");}));
  var ac=(D.acts||[]).filter(function(a){return ((a.client||'')+' '+(a.content||'')+' '+(a.next||'')).toLowerCase().indexOf(q)>=0;}).slice(0,5);
  if(ac.length)out+=_sgrp(jt('활동','Activities'),ac.map(function(a){return _srow('📞',a.client,a.date+' · '+(a.content||''),"setView('acts');closeM()");}));
  res.innerHTML=out||'<div class="empty">'+jt('결과 없음','No results')+'</div>';
}
// 편의: ESC 닫기 · Enter 저장(입력창 한정) · Ctrl/⌘+K 검색
document.addEventListener('keydown',function(e){
  var modalOpen=document.getElementById('mbg').style.display==='flex';
  var dwOpen=document.getElementById('dw').classList.contains('open');
  if((e.key==='k'||e.key==='K')&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); if(document.getElementById('app').style.display!=='none')openSearch(); return; }
  if(e.key==='Escape'){ if(modalOpen)closeM(); else if(dwOpen)closeDw(); }
  else if(e.key==='Enter'&&modalOpen&&e.target&&e.target.tagName==='INPUT'&&e.target.type!=='checkbox'&&e.target.id!=='gq'){ e.preventDefault(); saveM(); }
});
boot();
