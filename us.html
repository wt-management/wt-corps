<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>wontech</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇺🇸</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#f6f7f9;--card:#fff;--line:#e8ebf0;--line2:#f1f3f5;--ink:#0f172a;--body:#475569;--muted:#94a3b8;--brand:#1e3a8a;--ok:#15803d;--bad:#b91c1c;--warn:#b45309;--sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05)}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:light}
body{font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--body);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.1px;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
.hidden{display:none!important}
#boot-ov{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;z-index:200}
#app{display:none}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:236px;background:#0f172a;color:#94a3b8;display:flex;flex-direction:column;z-index:20}
.brand{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .lg{width:32px;height:32px;border-radius:9px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:17px}
.brand b{color:#fff;font-size:14px}.brand small{display:block;color:#64748b;font-size:10.5px}
.nav{flex:1;padding:14px 12px;overflow:auto}
.nav .grp{font-size:10.5px;font-weight:700;color:#475569;letter-spacing:.08em;padding:6px 12px 8px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;color:#cbd5e1;font-weight:500;margin-bottom:2px;cursor:pointer}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}.nav a.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
.nav .ico{width:18px;text-align:center}
.acct{margin:8px 12px 4px;background:#1e293b;border:1px solid #334155;border-radius:11px;padding:10px 11px}
.acct .row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.acct .av{width:30px;height:30px;border-radius:50%;background:#ff4500;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:13px}
.acct .nm{font-size:12px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct .em{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct .btns{display:flex;gap:5px}
.acct .btns button{flex:1;background:rgba(255,255,255,.06);border:1px solid #334155;border-radius:7px;padding:6px 0;color:#94a3b8;font-size:11px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.acct .btns button:hover{background:rgba(255,255,255,.12);color:#fff}
.switch-wrap{padding:6px 12px 4px;position:relative}
.switch-btn{width:100%;background:rgba(255,255,255,.05);border:1px solid #334155;border-radius:9px;padding:9px 11px;color:#94a3b8;font-size:12px;display:flex;align-items:center;gap:7px}
.switch-btn:hover{background:rgba(255,255,255,.1)}
.switch-dd{display:none;position:absolute;bottom:106%;left:12px;right:12px;background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;box-shadow:0 -10px 30px rgba(0,0,0,.5);z-index:30;padding:6px;max-height:60vh;overflow-y:auto}
.switch-dd.open{display:block}
.sw-item{margin-top:2px;border-radius:7px;padding:8px 11px;display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:12px;cursor:pointer}
.sw-item:hover{background:rgba(255,255,255,.1)}.sw-item.cur{color:#fff;font-weight:700;background:rgba(255,255,255,.14)}
.sw-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:18px;color:#fff;border-radius:5px;font-size:10px;font-weight:700;padding:0 5px}
#main{margin-left:236px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:15;background:rgba(246,247,249,.9);backdrop-filter:blur(8px);padding:18px 28px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.topbar h2{font-size:20px;font-weight:800;color:var(--ink)}
.topbar .desc{color:var(--muted);font-size:12.5px;margin-top:3px}
.wrap{padding:20px 28px 50px}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 13px;font-weight:600;font-size:13px;color:var(--ink);display:inline-flex;align-items:center;gap:6px;box-shadow:var(--sh)}
.btn:hover{background:#f8fafc}.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn-primary:hover{filter:brightness(.92)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px;box-shadow:none}
.sel{padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:var(--sh);font-size:12.5px}
.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(auto-fit,minmax(158px,1fr));margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--sh)}
.kpi .v{font-size:21px;font-weight:800;color:var(--ink);line-height:1.1}.kpi .l{font-size:11.5px;color:var(--muted);margin-top:6px}.kpi .s{font-size:11px;color:var(--muted);margin-top:4px}
.mcards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.mcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--sh);cursor:pointer;transition:border-color .15s,transform .15s}
.mcard:hover{border-color:#c7d2fe;transform:translateY(-1px)}
.mcard .mtop{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.mcard .mico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.mcard .mlbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.2}
.mcard .mval{font-size:23px;font-weight:800;color:var(--ink);line-height:1}
.mcard .msub{font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mtag{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:5px;font-size:10.5px;font-weight:700}
@media(max-width:1150px){.mcards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.mcards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.dash2col{grid-template-columns:1fr!important}}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--sh)}
.sect{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.c-blue{background:#e0e7ff;color:#4338ca}.c-green{background:#dcfce7;color:#15803d}.c-amber{background:#fef3c7;color:#b45309}.c-red{background:#fee2e2;color:#b91c1c}.c-gray{background:#eef1f5;color:#475569}.c-cyan{background:#cffafe;color:#0e7490}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:8px 11px;border-bottom:1px solid var(--line2);white-space:nowrap}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;background:#fafbfc}
td.l,th.l{text-align:left}
tbody tr{cursor:pointer}tbody tr:hover td{background:#f8f9ff}
.bar{height:7px;background:#f1f5f9;border-radius:6px;overflow:hidden}.bar>i{display:block;height:100%;border-radius:6px;background:var(--brand)}
.muted{color:var(--muted)}.up{color:var(--ok)}.dn{color:var(--bad)}
.empty{text-align:center;color:var(--muted);padding:26px;font-size:13px}
/* 임원 히어로 */
.hero{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;color:#e2e8f0;padding:22px 24px;margin-bottom:16px;display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:22px}
.hero .hl{font-size:11.5px;color:#94a3b8;font-weight:600}
.hero .hv{font-size:30px;font-weight:800;color:#fff;line-height:1.1;margin-top:5px}
.hero .hs{font-size:12px;color:#94a3b8;margin-top:5px}
.hero .divv{border-left:1px solid rgba(255,255,255,.12);padding-left:22px}
.gauge{height:9px;background:rgba(255,255,255,.14);border-radius:8px;overflow:hidden;margin-top:9px}
.gauge>i{display:block;height:100%;border-radius:8px}
/* 차트 */
.combo{display:flex;gap:5px;align-items:flex-end}
.combo .mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.combo .bars{width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px;height:130px;position:relative}
.combo .b1{width:38%;background:var(--brand);border-radius:4px 4px 0 0;min-width:8px}
.combo .b2{width:38%;background:#94c2a8;border-radius:4px 4px 0 0;min-width:8px}
.combo .tgt{position:absolute;left:6%;right:6%;border-top:2px dashed #cbd5e1}
.combo .ml{font-size:10px;color:var(--muted)}
.combo .mv{font-size:10.5px;font-weight:700;color:var(--ink)}
/* 칸반 (한국영업 CRM 스타일) */
.kb{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;align-items:stretch}
.kbcol{min-width:200px;flex:1;background:#f9fafb;border-radius:12px;padding:12px;border:1px solid var(--line)}
.kbcol.over{background:#e0eaff;border-color:#2563eb;border-style:dashed}
.kbhead{border-radius:8px;padding:10px 12px;margin-bottom:10px}
.kbhead .r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.kbhead .nm{font-size:12px;font-weight:700;letter-spacing:.04em}
.kbhead .cnt{color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
.kbhead .amt{font-size:13px;font-weight:800;color:#374151}
.kcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--sh)}
.kcard:hover{border-color:#c7d2fe;box-shadow:0 4px 12px rgba(37,99,235,.1)}
.kcard.drag{opacity:.4}
.kcard .t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;flex:1}
.kcard .prod{font-size:11px;color:#9ca3af;margin-top:2px}
.kcard .amt{font-size:15px;font-weight:800;color:#1d4ed8;margin-top:6px}
.kcard .ft{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.kcard .owner{font-size:11px;font-weight:600;color:#374151}
.kcard .prob{color:#fff;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.kcard .due{font-size:10px;color:#9ca3af;margin-top:5px}
.kcard .days{border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700}
.kbempty{text-align:center;padding:24px 0;color:#d1d5db;font-size:12px}
.c-violet{background:#ede9fe;color:#6d28d9}
/* 드로어 *//* 드로어 */
#dwbg{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;z-index:45}
#dw{position:fixed;top:0;right:0;bottom:0;width:600px;max-width:97vw;background:#fbfcfd;box-shadow:-16px 0 50px rgba(16,24,40,.22);transform:translateX(100%);transition:transform .25s;z-index:46;display:flex;flex-direction:column}
#dw.open{transform:none}
.dwh{padding:18px 22px;border-bottom:1px solid var(--line);background:#fff}
.dwh .k{font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.05em}
.dwh h3{font-size:18px;color:var(--ink);margin-top:4px}
.dwh .x{border:0;background:transparent;font-size:24px;color:var(--muted);cursor:pointer;float:right}
.dwb{padding:16px 22px;overflow:auto;flex:1}
.dwcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:13px;box-shadow:var(--sh)}
/* 모달 */
#mbg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal{background:#fff;border-radius:16px;width:540px;max-width:100%;max-height:92vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.mh h3{font-size:15.5px}.mh .x{border:0;background:transparent;font-size:22px;color:var(--muted);cursor:pointer}
.mb{padding:18px 20px}.fld{margin-bottom:12px}.fld label{display:block;font-size:12px;font-weight:600;color:var(--body);margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fafbfc}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;z-index:90;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1}
#pdf-fab{position:fixed;bottom:18px;right:18px;z-index:40;background:#475569;color:#fff;border:0;border-radius:22px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(15,23,42,.28)}
@media print{#sidebar,#pdf-fab,.topbar .desc,#dwbg,#dw{display:none!important}#main{margin-left:0}body{background:#fff}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}
@media(max-width:900px){.hero{grid-template-columns:1fr;gap:14px}.hero .divv{border-left:0;padding-left:0;border-top:1px solid rgba(255,255,255,.12);padding-top:14px}}
@media(max-width:820px){#sidebar{width:60px}.brand b,.brand small,.nav .grp,.nav a span.lbl,.acct,.switch-btn span{display:none}#main{margin-left:60px}.topbar,.wrap{padding-left:14px;padding-right:14px}.nav a{justify-content:center}.fr3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="boot-ov"><i class="bi bi-arrow-repeat" style="margin-right:8px"></i>불러오는 중…</div>

<div id="app">
  <aside id="sidebar">
    <div class="brand"><div class="lg">🇺🇸</div><div><b>미국법인</b><small>WONTECH USA</small></div></div>
    <nav class="nav" id="nav">
      <div class="grp">경영 요약</div>

      <a data-v="sched"><span class="ico">📅</span><span class="lbl">일정 · 할일</span></a>
      <div class="grp">CRM 영업</div>
      <a data-v="pipe"><span class="ico">🎯</span><span class="lbl">딜 파이프라인</span></a>
      <a data-v="accounts"><span class="ico">👥</span><span class="lbl">고객사 관리</span></a>
      <a data-v="acts"><span class="ico">📞</span><span class="lbl">활동 기록</span></a>
      <a data-v="perf"><span class="ico">🏆</span><span class="lbl">영업 성과</span></a>
      <div class="grp">영업 · 채권</div>
      <a data-v="sales"><span class="ico">🧾</span><span class="lbl">매출 · 수금</span></a>
      <a data-v="ar"><span class="ico">⏳</span><span class="lbl">미수금 현황</span></a>
      <a data-v="orders"><span class="ico">📝</span><span class="lbl">수주 관리</span></a>
      <a data-v="clients"><span class="ico">🏢</span><span class="lbl">거래처 분석</span></a>
      <div class="grp">운영</div>
      <a data-v="inv"><span class="ico">📦</span><span class="lbl">물류 · 재고</span></a>
      <a data-v="funds"><span class="ico">🏦</span><span class="lbl">자금 관리</span></a>
    </nav>
    <div style="padding:2px 12px 4px;display:flex;gap:5px">
      <button id="lang-ko" onclick="setLang('ko')" style="flex:1;background:rgba(255,255,255,.12);border:1px solid #334155;border-radius:8px;padding:6px 0;color:#fff;font-size:11.5px;font-weight:700;cursor:pointer">한국어</button>
      <button id="lang-en" onclick="setLang('en')" style="flex:1;background:rgba(255,255,255,.04);border:1px solid #334155;border-radius:8px;padding:6px 0;color:#94a3b8;font-size:11.5px;font-weight:700;cursor:pointer">English</button>
    </div>
    <div class="acct"><div class="row"><div class="av" id="uav">P</div><div style="flex:1;min-width:0"><div class="nm" id="unm">-</div><div class="em" id="uem">-</div></div></div>
      <div class="btns"><button onclick="changePw()"><i class="bi bi-key"></i> 비밀번호</button><button onclick="doLogout()"><i class="bi bi-box-arrow-right"></i> 로그아웃</button></div></div>
    <div class="switch-wrap"><button class="switch-btn" onclick="document.getElementById('swdd').classList.toggle('open')"><i class="bi bi-grid-3x3-gap"></i><span style="flex:1;text-align:left;font-weight:600">사이트 이동</span><i class="bi bi-chevron-up" style="font-size:10px"></i></button>
      <div class="switch-dd" id="swdd">
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/total.html')"><span class="sw-badge" style="background:#4f46e5">종합</span><span style="flex:1">전사 종합 경영현황</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/')"><span class="sw-badge" style="background:#0891b2">KR</span><span style="flex:1">한국 영업</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/intl.html')"><span class="sw-badge" style="background:#0d9488">INT</span><span style="flex:1">해외 영업</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wtj-management/')"><span class="sw-badge" style="background:#f59e0b">JP</span><span style="flex:1">일본법인 관리</span></div>
        <div class="sw-item cur"><span class="sw-badge" style="background:#1e3a8a">US</span><span style="flex:1">미국법인 관리</span><i class="bi bi-check2"></i></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wt-corps/th.html')"><span class="sw-badge" style="background:#b45309">TH</span><span style="flex:1">태국법인 관리</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wt-consumables/')"><span class="sw-badge" style="background:#16a34a">일보</span><span style="flex:1">일일매출보고</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/pm-planner/')"><span class="sw-badge" style="background:#8b5cf6">기획</span><span style="flex:1">상품기획 PM</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/sales-portfolio/')"><span class="sw-badge" style="background:#3f5e7a">PF</span><span style="flex:1">Sales Portfolio</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/demo-schedule/')"><span class="sw-badge" style="background:#2563eb">데모</span><span style="flex:1">데모 일정</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/#app=admin')"><span class="sw-badge" style="background:#6b7280">ADM</span><span style="flex:1">관리자 페이지</span></div>
      </div></div>
  </aside>
  <main id="main"><div id="view"></div></main>
</div>

const EN_KEYS=Object.keys(EN).filter(k=>k.length>1).sort((a,b)=>b.length-a.length);
function trStr(t){
  if(EN[t]!=null)return EN[t];
  let m;
  if(m=t.match(/^(\d+)월$/))return MONTHS_EN[(+m[1]-1)%12];
  if(m=t.match(/^(\d+)일째$/))return m[1]+'d';
  if(m=t.match(/^(\d+)일$/))return m[1]+'d';
  if(m=t.match(/^(\d+)건$/))return m[1];
  return null;
}
function applyLang(){
  const on=(L==='en');
  ['nav','view','dw','modal'].forEach(id=>{
    const root=document.getElementById(id);if(!root)return;
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);let n;
    const nodes=[];while(n=w.nextNode())nodes.push(n);
    nodes.forEach(nd=>{
      if(!on){ if(nd._ko!=null){nd.nodeValue=nd._ko;nd._ko=null;} return; }
      const raw=nd.nodeValue, t=raw.trim(); if(!t)return;
      const ex=trStr(t);
      if(ex!=null){ if(nd._ko==null)nd._ko=raw; nd.nodeValue=raw.replace(t,ex); return; }
      let out=raw;
      for(const k of EN_KEYS){ if(out.indexOf(k)>=0) out=out.split(k).join(EN[k]); }
      if(out!==raw){ if(nd._ko==null)nd._ko=raw; nd.nodeValue=out; }
    });
    root.querySelectorAll('[placeholder]').forEach(el=>{
      if(on){ if(!el._kop)el._kop=el.getAttribute('placeholder')||''; let o=el._kop; const r=trStr(o.trim()); if(r!=null)o=r; else for(const k of EN_KEYS){ if(o.indexOf(k)>=0)o=o.split(k).join(EN[k]); } el.setAttribute('placeholder',o); }
      else if(el._kop!=null){ el.setAttribute('placeholder',el._kop); el._kop=null; }
    });
  });
  const bk=document.getElementById('lang-ko'),be=document.getElementById('lang-en');
  if(bk&&be){bk.style.background=on?'rgba(255,255,255,.04)':'rgba(255,255,255,.12)';bk.style.color=on?'#94a3b8':'#fff';be.style.background=on?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';be.style.color=on?'#fff':'#94a3b8';}
}

function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function ym(d){return String(d||'').slice(0,7);}

function curYr(){return today().slice(0,4);}
function fm(n){n=Number(n)||0;return SYM+Math.round(n).toLocaleString();}
function fmS(n){n=Number(n)||0;const a=Math.abs(n);if(a>=1e6)return SYM+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(a>=1e3)return SYM+(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';return SYM+Math.round(n).toLocaleString();}
function fkrw(n){const w=(Number(n)||0)*(D.rate||0);if(!w)return'';const a=Math.abs(w);if(a>=1e8)return'₩'+(w/1e8).toFixed(1)+'억';if(a>=1e4)return'₩'+Math.round(w/1e4).toLocaleString()+'만';return'₩'+Math.round(w).toLocaleString();}
function monthsOf(arr,f){const s=new Set(arr.map(x=>ym(x[f||'date'])).filter(Boolean));return[...s].sort().reverse();}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function pct(n,d){return d>0?n/d*100:0;}
function ordChip(s){return `<span class="chip ${ORD_ST[s]||'c-gray'}">${esc(s)}</span>`;}
function clientList(){return [...new Set([].concat((D.sales||[]).map(s=>s.client),(D.orders||[]).map(o=>o.client)).filter(Boolean))].sort();}
function dlist(){return '<datalist id="dl-clients">'+clientList().map(c=>'<option value="'+esc(c)+'">').join('')+'</datalist>';}

// ── 집계 (매출인식 기준 = sales.date / 수금 = collections.date) ──
function colSum(s){return (s.collections||[]).reduce((a,c)=>a+(+c.amt||0),0);}
function outAmt(s){return Math.max(0,(+s.amt||0)-colSum(s));}
function salesMonthly(yr){const m={};(D.sales||[]).forEach(s=>{const d=String(s.date||'');if(d.slice(0,4)!==yr)return;const k=+d.slice(5,7);m[k]=(m[k]||0)+(+s.amt||0);});return m;}
function payMonthly(yr){const m={};(D.sales||[]).forEach(s=>(s.collections||[]).forEach(c=>{const d=String(c.date||'');if(d.slice(0,4)!==yr)return;const k=+d.slice(5,7);m[k]=(m[k]||0)+(+c.amt||0);}));return m;}
function tgtMonthly(yr){const m={};Object.keys(D.targets||{}).forEach(k=>{if(k.slice(0,4)===yr)m[+k.slice(5,7)]=+D.targets[k]||0;});return m;}
function ytd(m,uptoM){let s=0;for(let i=1;i<=uptoM;i++)s+=m[i]||0;return s;}
function totalOut(){return (D.sales||[]).reduce((a,s)=>a+outAmt(s),0);}
function agingBucket(s){const o=outAmt(s);if(o<=0)return null;const d=daysBetween(s.date||today(),today());return d>=90?'90+':d>=60?'60+':d>=30?'30+':'30내';}
function fundsBalAcc(name){const acc=(D.accounts||[]).find(a=>a.name===name);let b=acc?(+acc.opening||0):0;(D.funds||[]).forEach(f=>{if((f.account||'주거래계좌')!==name)return;b+=(f.kind==='입금'?1:-1)*(+f.amt||0);});return b;}
function fundsBal(){return (D.accounts||[]).reduce((a,x)=>a+fundsBalAcc(x.name),0);}
function itemQty(name){const it=(D.items||[]).find(i=>i.name===name);let q=it?(+it.qty0||0):0;(D.moves||[]).forEach(m=>{if(m.item===name)q+=(m.type==='입고'?1:-1)*(+m.qty||0);});return q;}

// ── 라우팅 ──
const VIEWS_KEYS=['dash','report','perf','sched','pipe','accounts','acts','sales','ar','orders','clients','inv','funds'];
function setView(v,noPush){curView=v;document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.v===v));render();window.scrollTo(0,0);if(!noPush){try{history.pushState({v:v},'','#'+v);}catch(e){}}}
window.addEventListener('popstate',function(){var v=(location.hash||'').replace('#','');setView(VIEWS_KEYS.indexOf(v)>=0?v:'dash',true);});
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>setView(a.dataset.v)));
function render(){const f={dash:vDash,report:vReport,perf:vPerf,sched:vSched,pipe:vPipe,accounts:vAccounts,acts:vActs,sales:vSales,ar:vAR,orders:vOrders,clients:vClients,inv:vInv,funds:vFunds}[curView];document.getElementById('view').innerHTML=f();if(curView==='pipe')bindKb();applyLang();}
function head(t,d,acts){return `<div class="topbar"><div><h2>${t}</h2><div class="desc">${d}</div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${acts||''}</div></div><div class="wrap">`;}
function isEmpty(){return !(D.sales||[]).length&&!(D.orders||[]).length&&!(D.funds||[]).length&&!(D.items||[]).length;}

// ── 임원 대시보드 ──
function vDash(){
  const yr=curYr(), mo=+curYm().slice(5,7);
  const sm=salesMonthly(yr), pm=payMonthly(yr), tm=tgtMonthly(yr);
  const mSale=sm[mo]||0, ySale=ytd(sm,mo), yPay=ytd(pm,mo), yTgt=ytd(tm,mo), fyTgt=ytd(tm,12);
  const achv=pct(ySale,yTgt), payRate=pct(yPay,ySale);
  const out=totalOut(), bal=fundsBal();
  const backlog=(D.orders||[]).filter(o=>o.status!=='납품완료'&&o.status!=='취소');

  const low=(D.items||[]).filter(i=>itemQty(i.name)<(+i.safety||0));

  const openDeals=(D.deals||[]).filter(d=>DEAL_OPEN.includes(d.stage));
  const wPipe=openDeals.reduce((a,d)=>a+(+d.amt||0)*(+d.prob||0)/100,0);
  const fu=(D.acts||[]).filter(a=>a.nextDate&&a.nextDate<today()&&!a.doneNext);
  const fuDeals=(D.deals||[]).filter(d=>DEAL_OPEN.includes(d.stage)&&d.next&&d.nextDate&&d.nextDate<today());
  // 데이터 집계 (KPI·차트용)

  const byPrY={};(D.sales||[]).forEach(x=>{if(String(x.date||'').slice(0,4)!==yr||!x.product)return;byPrY[x.product]=(byPrY[x.product]||0)+(+x.amt||0);});
  const topPr=Object.entries(byPrY).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxPr=Math.max(1,...topPr.map(x=>x[1]));
  const itemsN=(D.items||[]).length;
  // 히어로
  const gcol=achv>=100?'#4ade80':achv>=70?'#60a5fa':'#fbbf24';
  const hero=`<div class="hero">
    <div><div class="hl">${yr}년 누적 매출 (매출인식 기준)</div><div class="hv">${fm(ySale)}</div>
      <div class="hs">${fkrw(ySale)} · 이번달 ${fm(mSale)} · 월평균 ${fm(mo?ySale/mo:0)}</div>
      <div class="hs" style="margin-top:8px">목표 달성률 <b style="color:${gcol}">${yTgt?achv.toFixed(1)+'%':'목표 미설정'}</b>${yTgt?' <span style="color:#64748b">(목표 '+fm(yTgt)+')</span>':''}</div>
      <div class="gauge"><i style="width:${Math.min(100,achv)}%;background:${gcol}"></i></div></div>
    <div class="divv"><div class="hl">수금 (입금 기준 · 참고)</div><div class="hv" style="font-size:24px">${fm(yPay)}</div>
      <div class="hs">수금률 ${ySale?payRate.toFixed(0)+'%':'-'} · ${fkrw(yPay)}</div>
      <div class="hl" style="margin-top:12px">미수채권</div><div style="font-size:20px;font-weight:800;color:${out?'#fca5a5':'#4ade80'}">${fm(out)}</div>
      <div class="hs">${fkrw(out)}</div></div>
    <div class="divv"><div class="hl">자금 잔액</div><div class="hv" style="font-size:24px;color:${bal<0?'#fca5a5':'#fff'}">${fm(bal)}</div>
      <div class="hs">${fkrw(bal)}</div>
      <div class="hl" style="margin-top:12px">수주 잔고</div><div style="font-size:20px;font-weight:800">${fm(backAmt)}</div>
      <div class="hs">${backlog.length}건 진행${lateOrd.length?' · <span style="color:#fca5a5">납기지연 '+lateOrd.length+'건</span>':''}</div></div>
  </div>`;
  // 월별 콤보(매출 vs 수금 + 목표선)

      <div class="b2" style="height:${pv/mx*100}%" title="${m}월 수금 ${fm(pv)}"></div></div>
      <div class="mv">${sv?fmS(sv):''}</div><div class="ml">${m}월</div></div>`;}).join('');
  // 미수 aging + Top 미수 거래처
  const ag={'30내':0,'30+':0,'60+':0,'90+':0};
  (D.sales||[]).forEach(s=>{const b=agingBucket(s);if(b)ag[b]+=outAmt(s);});
  const agTot=Object.values(ag).reduce((a,b)=>a+b,0)||1;
  const agColors={'30내':'#94a3b8','30+':'#f59e0b','60+':'#ea580c','90+':'#dc2626'};
  const agBar='<div style="display:flex;height:14px;border-radius:7px;overflow:hidden">'+Object.keys(ag).map(k=>ag[k]?`<div title="${k}: ${fm(ag[k])}" style="width:${ag[k]/agTot*100}%;background:${agColors[k]}"></div>`:'').join('')+'</div>'
    +'<div style="display:flex;gap:12px;margin-top:8px;font-size:11.5px;flex-wrap:wrap">'+Object.keys(ag).map(k=>`<span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${agColors[k]};margin-right:4px"></span>${k} <b>${fmS(ag[k])}</b></span>`).join('')+'</div>';
  const byC={};(D.sales||[]).forEach(s=>{const o=outAmt(s);if(o>0&&s.client)byC[s.client]=(byC[s.client]||0)+o;});
  const topOut=Object.entries(byC).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topHtml=topOut.length?topOut.map(([c,v])=>`<div onclick="openClient('${esc(c).replace(/'/g,"&#39;")}')" style="display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);cursor:pointer;font-size:12.5px"><b style="color:var(--ink)">${esc(c)}</b><span style="color:var(--bad);font-weight:700">${fm(v)}</span></div>`).join(''):'<div class="empty" style="color:var(--ok)">미수 없음</div>';
  // 납기·재고 알림
  const alerts=[];
  lateOrd.forEach(o=>alerts.push(`<div onclick="mOrder('${o.id}')" style="cursor:pointer;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px">🔴 <b>${esc(o.client)}</b> ${esc(o.product||'')} 납기 ${o.eta} 경과 (${ordChip(o.status)})</div>`));
  backlog.filter(o=>o.eta&&o.eta>=today()&&daysBetween(today(),o.eta)<=7).forEach(o=>alerts.push(`<div onclick="mOrder('${o.id}')" style="cursor:pointer;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px">🟡 <b>${esc(o.client)}</b> ${esc(o.product||'')} 납기 D-${daysBetween(today(),o.eta)}</div>`));
  low.forEach(i=>alerts.push(`<div onclick="setView('inv')" style="cursor:pointer;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px">📦 <b>${esc(i.name)}</b> 재고 ${itemQty(i.name)}${esc(i.unit||'')} &lt; 안전 ${i.safety}</div>`));
  fu.forEach(a=>alerts.push(`<div onclick="setView('acts')" style="cursor:pointer;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px">📞 <b>${esc(a.client)}</b> 후속조치 지연: ${esc(a.next)} (${a.nextDate})</div>`));
  fuDeals.forEach(d=>alerts.push(`<div onclick="setView('pipe')" style="cursor:pointer;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px">🎯 <b>${esc(d.client)}</b> 딜 액션 지연: ${esc(d.next)} (${d.nextDate})</div>`));
  return head('📈 임원 대시보드',`${'미국법인'} 경영 현황 · 환율 ${SYM}1 = ₩${(D.rate||0).toLocaleString()} · 기준 ${today()}`,
    `<button class="btn btn-sm" onclick="mTargets()"><i class="bi bi-bullseye"></i> 목표 설정</button><button class="btn btn-sm" onclick="setRate()"><i class="bi bi-currency-exchange"></i> 환율</button>${isEmpty()?'<button class="btn btn-primary" onclick="seedSample(true)">샘플 데이터 넣기</button>':''}`)
    +hero
    +`<div class="mcards">
      <div class="mcard" onclick="setView('sales')">
        <div class="mtop"><span class="mico" style="background:#e0e7ff;color:#4338ca">💵</span><span class="mlbl">${jt('이번달 매출','Revenue (MTD)')}</span></div>
        <div class="mval">${fm(mSale)}</div>
        <div class="msub">${momG!=null?`<span class="mtag" style="background:${momG>=0?'#dcfce7':'#fee2e2'};color:${momG>=0?'#15803d':'#b91c1c'}">${momG>=0?'▲':'▼'} ${Math.abs(momG).toFixed(0)}%</span> ${jt('전월비','vs last mo.')}`:jt('전월 데이터 없음','no prior month')}</div></div>
      <div class="mcard" onclick="setView('sales')">
        <div class="mtop"><span class="mico" style="background:#dcfce7;color:#15803d">💰</span><span class="mlbl">${jt('수금률 (누적)','Collection Rate')}</span></div>
        <div class="mval">${ySale?payRate.toFixed(0)+'%':'-'}</div>
        <div class="bar" style="margin-top:8px"><i style="width:${Math.min(100,payRate)}%;background:#22c55e"></i></div>
        <div class="msub">${jt('수금','collected')} ${fmS(yPay)} / ${fmS(ySale)}</div></div>
      <div class="mcard" onclick="setView('ar')">
        <div class="mtop"><span class="mico" style="background:#fef3c7;color:#b45309">⏳</span><span class="mlbl">${jt('미수채권','Receivables')}</span></div>
        <div class="mval" style="color:${out?'var(--bad)':'var(--ink)'}">${fm(out)}</div>
        <div class="msub">${ag['90+']?`<span class="mtag" style="background:#fee2e2;color:#b91c1c">90d+ ${fmS(ag['90+'])}</span> ${jt('회수 우선','collect first')}`:jt('장기미수 없음','no aged AR')}</div></div>
      <div class="mcard" onclick="setView('pipe')">
        <div class="mtop"><span class="mico" style="background:#ede9fe;color:#6d28d9">🎯</span><span class="mlbl">${jt('가중 파이프라인','Weighted Pipeline')}</span></div>
        <div class="mval">${fm(wPipe)}</div>
        <div class="msub">${jt('진행 딜','open deals')} ${openDeals.length} · ${jt('총액','total')} ${fmS(openDeals.reduce((a,d)=>a+(+d.amt||0),0))}</div></div>
      <div class="mcard" onclick="setView('inv')">
        <div class="mtop"><span class="mico" style="background:#cffafe;color:#0e7490">📦</span><span class="mlbl">${jt('재고 상태','Inventory Health')}</span></div>
        <div class="mval">${itemsN-low.length}<span style="font-size:14px;color:var(--muted);font-weight:600">/${itemsN} ${jt('정상','OK')}</span></div>
        <div class="msub">${low.length?`<span class="mtag" style="background:#fee2e2;color:#b91c1c">${jt('부족','low')} ${low.length}</span> ${esc(low.map(i=>i.name).slice(0,2).join(', '))}`:jt('전 품목 안전재고 이상','all above safety')}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:24px" class="dash2col">

        ${itemsN?(D.items||[]).map(i=>{const q=itemQty(i.name);const sf=+i.safety||0;const lo=q<sf;const ratio=sf?Math.min(100,q/sf*100):100;
          return `<div style="padding:6px 0"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><b style="color:var(--ink)">${esc(i.name)}</b><span style="font-weight:700;color:${lo?'var(--bad)':'var(--body)'}">${q}${esc(i.unit||'')}${lo?' ⚠':''}</span></div><div class="bar" style="background:#f1f5f9"><i style="width:${ratio}%;background:${lo?'var(--bad)':'#22c55e'}"></i></div><div style="font-size:10px;color:var(--muted);margin-top:2px">${jt('안전재고','safety')} ${sf}${esc(i.unit||'')}</div></div>`;}).join(''):`<div class="empty">${jt('등록된 품목 없음','No items')}</div>`}</div>
      <div><div class="sect"><span>📊 ${jt('제품 Top5 (연간 매출)','Top 5 Products (YTD)')}</span></div>
        ${topPr.length?topPr.map(([p,v])=>`<div style="display:flex;align-items:center;gap:9px;padding:5px 0"><div style="width:130px;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p)}</div><div class="bar" style="flex:1"><i style="width:${v/maxPr*100}%"></i></div><div style="width:76px;text-align:right;font-size:11.5px;font-weight:700">${fmS(v)}</div></div>`).join(''):'<div class="empty">'+jt('매출 데이터 없음','No sales data')+'</div>'}</div>
  </div></div>
  <div class="card" style="margin-bottom:14px"><div class="sect"><span>📊 월별 매출 vs 수금 <span class="muted" style="font-weight:500;font-size:11.5px">막대=매출(진), 수금(연) · 점선=목표</span></span><span class="muted" style="font-size:12px">${yr}년</span></div><div class="combo">${combo}</div></div>
    <div class="card" style="margin-bottom:14px"><div class="sect"><span>🎯 딜 파이프라인 <span class="muted" style="font-weight:500;font-size:11.5px">CRM · 클릭 → 칸반</span></span><span class="muted" style="font-size:12px;cursor:pointer" onclick="setView('pipe')">전체 →</span></div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">

        return `<div onclick="setView('pipe')" style="flex:1;min-width:120px;cursor:pointer;background:#f8fafc;border:1px solid var(--line);border-radius:11px;padding:11px 13px;border-top:3px solid ${DEAL_ST[st]}"><div style="font-size:11.5px;font-weight:700;color:${DEAL_ST[st]}">${st} <span class="muted">${ds.length}</span></div><div style="font-size:16px;font-weight:800;color:var(--ink);margin-top:3px">${fmS(amt)}</div></div>`;}).join('<div style="color:#cbd5e1">→</div>')}
      <div style="min-width:140px;background:#0f172a;border-radius:11px;padding:11px 13px"><div style="font-size:11.5px;color:#94a3b8;font-weight:700">가중 예상매출</div><div style="font-size:16px;font-weight:800;color:#fff;margin-top:3px">${fmS(wPipe)}</div></div></div></div>
    <div class="grid" style="grid-template-columns:1.2fr 1fr 1fr">
      <div class="card"><div class="sect"><span>⏳ 미수채권 구성 (경과일)</span><span class="muted" style="font-size:12px;cursor:pointer" onclick="setView('ar')">상세 →</span></div>${agBar}</div>
      <div class="card"><div class="sect"><span>🏢 미수 Top 거래처</span></div>${topHtml}</div>
      <div class="card"><div class="sect"><span>🔔 알림 (납기·재고)</span></div>${alerts.length?alerts.join(''):'<div class="empty" style="color:var(--ok)">알림 없음</div>'}</div>
    </div></div>`;
}
async function setRate(){const v=prompt(CUR+' → KRW 환율:',D.rate||0);if(v===null)return;D.rate=Number(v)||0;await saveAll('환율 저장됨');}
function mTargets(){
  const yr=curYr();
  let rows='';for(let m=1;m<=12;m++){const k=yr+'-'+String(m).padStart(2,'0');rows+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:38px;font-size:12.5px;font-weight:600">${m}월</span><input id="tg-${m}" type="number" value="${D.targets[k]||''}" placeholder="0" style="flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fafbfc"></div>`;}
  openM(yr+'년 월별 매출 목표 ('+CUR+')',rows+'<div class="muted" style="font-size:11.5px;margin-top:8px">임원 대시보드 달성률·목표선에 반영됩니다.</div>',
    async()=>{for(let m=1;m<=12;m++){const k=yr+'-'+String(m).padStart(2,'0');const v=Number(document.getElementById('tg-'+m).value)||0;if(v)D.targets[k]=v;else delete D.targets[k];}return await saveAll('목표 저장됨');},null);
}

// ── 매출 · 수금 ──
let fSalesYm='',fOutOnly=false,fSalesQ='';
function vSales(){
  const yms=monthsOf(D.sales||[]);

function vPipe(){
  let ALL=(D.deals||[]).slice();

  const stages=DEAL_OPEN.concat(['계약완료']);

    const c=DEAL_ST[st];

        ${d.next?`<div style="font-size:10px;color:#059669;margin-top:5px;background:#ecfdf5;border-radius:5px;padding:3px 6px"><i class="bi bi-arrow-right-circle-fill"></i> ${esc(d.next)}${d.nextDate?' · '+d.nextDate:''}${d.nextDate&&d.nextDate<today()?' ⚠':''}</div>`:''}
        ${d.expected?`<div class="due" style="${overdue?'color:#dc2626;font-weight:700':closingThis?'color:#d97706;font-weight:700':''}"><i class="bi bi-calendar3"></i> 예상 ${d.expected}${overdue?' ⚠️ 기한초과':closingThis?' · 이달마감':''}</div>`:''}
        ${(st==='협의중'||st==='견적발송')?`<div style="margin-top:6px"><button class="btn btn-sm" style="color:var(--ok);width:100%" onclick="event.stopPropagation();wonDeal('${d.id}')">✓ 성사 → 수주 생성</button></div>`:''}
      </div>`;}).join('');
    return `<div class="kbcol" data-st="${st}">
      <div class="kbhead" style="background:${isWon?'#f0fdf4':'#f8faff'};border-left:3px solid ${c}">
        <div class="r1"><span class="nm" style="color:${c}">${st}</span><span class="cnt" style="background:${c}">${ds.length}</span></div>
        <div class="amt">${fm(amt)}</div></div>
      <div class="kbbody" data-st="${st}" style="min-height:60px">${cards||'<div class="kbempty"><i class="bi bi-inbox" style="font-size:22px;display:block;margin-bottom:4px"></i>딜 없음</div>'}</div>
    </div>`;}).join('');
  const open=ALL.filter(d=>DEAL_OPEN.includes(d.stage));
  const w=open.reduce((a,d)=>a+(+d.amt||0)*(+d.prob||0)/100,0);
  const closing=open.filter(d=>d.expected&&d.expected.slice(0,7)===thisYm);
  return head('🎯 딜 파이프라인','카드를 끌어 단계 이동 · 성사 시 수주 자동 생성 · 클릭 → 수정',

    `<select class="sel" onchange="fPipeOwner=this.value;render()"><option value="">담당 전체</option>${owners.map(o=>`<option ${fPipeOwner===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`+
    `${(fPipeOwner||fPipeQ)?'<button class="btn btn-sm" onclick="fPipeOwner=\'\';fPipeQ=\'\';render()">초기화</button>':''}`+
    `<button class="btn btn-sm" onclick="csvDeals()"><i class="bi bi-download"></i> CSV</button><button class="btn btn-primary" onclick="mDeal()">+ 딜 등록</button>`)

      <div class="kpi"><div class="v">${(D.deals||[]).filter(d=>d.stage==='계약완료').length}</div><div class="l">성사 누적</div></div></div>
    <div class="kb">${cols}</div></div>`;
}
function bindKb(){
  document.querySelectorAll('.kcard[draggable]').forEach(c=>{
    c.addEventListener('dragstart',()=>{dragDeal=c.dataset.id;c.classList.add('drag');});
    c.addEventListener('dragend',()=>{c.classList.remove('drag');document.querySelectorAll('.kbbody.over').forEach(x=>x.classList.remove('over'));});});
  document.querySelectorAll('.kbcol').forEach(b=>{
    b.addEventListener('dragover',e=>{e.preventDefault();b.classList.add('over');});
    b.addEventListener('dragleave',()=>b.classList.remove('over'));
    b.addEventListener('drop',async e=>{e.preventDefault();b.classList.remove('over');
      const d=(D.deals||[]).find(x=>x.id===dragDeal);dragDeal=null;
      if(!d||d.stage===b.dataset.st)return;

      await saveAll('단계 이동: '+d.stage);});});
}

function vPerf(){
  const owners=[...new Set((D.deals||[]).map(d=>d.owner).filter(Boolean))];
  const stat=owners.map(o=>{
    const ds=(D.deals||[]).filter(d=>d.owner===o);
    const open=ds.filter(d=>DEAL_OPEN.includes(d.stage));
    const won=ds.filter(d=>d.stage==='계약완료');
    const lost=ds.filter(d=>d.stage==='실패');
    const wPipe=open.reduce((a,d)=>a+(+d.amt||0)*(+d.prob||0)/100,0);
    const wonAmt=won.reduce((a,d)=>a+(+d.amt||0),0);
    const closed=won.length+lost.length;
    const winRate=closed?won.length/closed*100:(ds.length?won.length/ds.length*100:0);
    return {o,deals:ds.length,open:open.length,openAmt:open.reduce((a,d)=>a+(+d.amt||0),0),wPipe,won:won.length,wonAmt,winRate};
  }).sort((a,b)=>(b.wPipe+b.wonAmt)-(a.wPipe+a.wonAmt));
  const maxScore=Math.max(1,...stat.map(x=>x.wPipe+x.wonAmt));
  const medals=['🥇','🥈','🥉'];
  const rows=stat.length?stat.map((s,i)=>`<tr onclick="fPipeOwner='${esc(s.o).replace(/'/g,"&#39;")}';setView('pipe')">
    <td class="l"><b style="color:var(--ink)">${medals[i]||'&nbsp;&nbsp;'} ${esc(s.o)}</b></td>
    <td>${s.open}</td><td>${fm(s.openAmt)}</td>
    <td><b style="color:var(--brand)">${fm(s.wPipe)}</b></td>
    <td>${s.won}</td><td><b style="color:var(--ok)">${fm(s.wonAmt)}</b></td>
    <td><span class="chip ${s.winRate>=60?'c-green':s.winRate>=30?'c-amber':'c-gray'}">${s.winRate.toFixed(0)}%</span></td>
    <td style="width:110px"><div class="bar"><i style="width:${(s.wPipe+s.wonAmt)/maxScore*100}%"></i></div></td></tr>`).join('')
    :`<tr><td colspan="8" class="empty">${jt('딜 담당자 데이터가 없습니다','No deal owners yet')}</td></tr>`;
  const totPipe=stat.reduce((a,s)=>a+s.wPipe,0), totWon=stat.reduce((a,s)=>a+s.wonAmt,0);
  const totOpen=stat.reduce((a,s)=>a+s.open,0);
  return head('🏆 영업 성과', jt('담당자별 파이프라인·성사·전환율 리더보드 · 행 클릭 → 해당 담당 딜','Sales rep leaderboard · click a row to see their deals'),'')
    +`<div class="grid kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
      <div class="kpi"><div class="v">${owners.length}</div><div class="l">${jt('영업 담당','Reps')}</div></div>
      <div class="kpi"><div class="v">${totOpen}</div><div class="l">${jt('진행 딜','Open deals')}</div></div>
      <div class="kpi"><div class="v" style="color:var(--brand)">${fm(totPipe)}</div><div class="l">${jt('가중 파이프라인','Weighted Pipeline')}</div></div>
      <div class="kpi"><div class="v" style="color:var(--ok)">${fm(totWon)}</div><div class="l">${jt('누적 성사액','Total Won')}</div></div></div>
    <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th class="l">${jt('담당','Rep')}</th><th>${jt('진행','Open')}</th><th>${jt('진행액','Open $')}</th><th>${jt('가중예상','Weighted')}</th><th>${jt('성사','Won')}</th><th>${jt('성사액','Won $')}</th><th>${jt('전환율','Win%')}</th><th>${jt('스코어','Score')}</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="muted" style="font-size:11.5px;margin-top:10px">${jt('※ 전환율 = 성사 딜 ÷ (성사+실패) · 스코어 = 가중 파이프라인 + 누적 성사액','Win% = won ÷ (won+lost) · Score = weighted pipeline + total won')}</div></div>`;
}

function schWeekDays(ref){const x=new Date(ref);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);const a=[];for(let i=0;i<7;i++){const d=new Date(x);d.setDate(d.getDate()+i);a.push(d);}return a;}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

  const y=schRef.getFullYear(),m=schRef.getMonth();const start=schWeekDays(new Date(y,m,1))[0];const items=schItems();

  let cells='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(d.getDate()+i);const ds=fmtD(d);const other=d.getMonth()!==m;const isT=ds===today();const its=items.filter(x=>x.date===ds);
    cells+=`<div style="min-height:92px;border:1px solid var(--line2);padding:3px 5px;${isT?'background:#eff6ff':other?'background:#fafbfc':''};overflow:hidden"><div style="font-size:11px;font-weight:700;color:${other?'#cbd5e1':(d.getDay()===0?'#dc2626':'var(--ink)')}">${d.getDate()}</div>${its.slice(0,3).map(x=>`<div onclick="schClick2('${x.ref}','${x.id}')" title="${esc(x.title)}" style="font-size:9.5px;border-radius:3px;padding:1px 4px;margin-top:2px;background:${SCH_KIND[x.kind].c};color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;${x.done?'opacity:.5':''}">${SCH_KIND[x.kind].i} ${esc(x.title)}</div>`).join('')}${its.length>3?`<div style="font-size:9px;color:var(--muted);margin-top:1px">+${its.length-3}</div>`:''}</div>`;}
  return `<div style="font-size:15px;font-weight:800;color:var(--ink);margin-bottom:10px">${jt(y+'년 '+(m+1)+'월', MONTHS_EN[m]+' '+y)}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff">${dn.map((x,i)=>`<div style="padding:7px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);background:#fafbfc;border-bottom:1px solid var(--line)">${jt(x,dnE[i])}</div>`).join('')}${cells}</div>`;
}
function mTask(id){const tk=id?(D.tasks||[]).find(x=>x.id===id):{title:'',date:today(),time:'',owner:(ME.split('@')[0]||''),memo:'',done:false};
  openM(id?jt('할일 수정','Edit Task'):jt('할일 추가','New Task'),
    `<div class="fld"><label>${jt('할 일','Task')}</label><input id="f-title" value="${esc(tk.title)}" placeholder="${jt('예: Beverly Hills 데모 준비','e.g. Prep demo for Beverly Hills')}"></div>
    <div class="fr3"><div class="fld"><label>${jt('날짜','Date')}</label><input id="f-date" type="date" value="${tk.date||today()}"></div><div class="fld"><label>${jt('시간','Time')}</label><input id="f-time" type="time" value="${tk.time||''}"></div><div class="fld"><label>${jt('담당','Owner')}</label><input id="f-owner" value="${esc(tk.owner||'')}"></div></div>
    <div class="fld"><label>${jt('메모','Notes')}</label><input id="f-memo" value="${esc(tk.memo||'')}"></div>`,
    async()=>{const g=x=>document.getElementById(x).value;const rec={id:id||uid(),title:g('f-title').trim(),date:g('f-date'),time:g('f-time'),owner:g('f-owner').trim(),memo:g('f-memo').trim(),done:(id&&tk.done)||false};
      if(!rec.title){toast(jt('할 일을 입력하세요','Enter a task'));return false;}
      const i=(D.tasks||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.tasks[i]=rec;else D.tasks.push(rec);return await saveAll();},
    id?async()=>{D.tasks=D.tasks.filter(x=>x.id!==id);await saveAll(jt('삭제됨','Deleted'));}:null);
}

// ── 딜 드로어 (파이프라인 + 일정/할일 통합) ──
function openDeal(id){
  const d=(D.deals||[]).find(x=>x.id===id);if(!d)return;
  const tasks=(D.tasks||[]).filter(t=>t.dealId===id).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const acts=(D.acts||[]).filter(a=>a.client===d.client).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6);
  const stageBar=Object.keys(DEAL_ST).map(st=>`<span onclick="dealStage('${id}','${st}')" style="cursor:pointer;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;${d.stage===st?`background:${DEAL_ST[st]};color:#fff`:'background:#eef1f5;color:#94a3b8'}">${jt(st,EN[st]||st)}</span>`).join('');
  const taskHtml=tasks.length?tasks.map(t=>{const late=t.date&&t.date<today()&&!t.done;
    return `<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12.5px"><input type="checkbox" ${t.done?'checked':''} onclick="toggleTaskDrawer('${t.id}','${id}')" style="cursor:pointer"><span style="flex:1;${t.done?'text-decoration:line-through;color:var(--muted)':''}">${esc(t.title)}</span>${t.date?`<span class="muted" style="font-size:11px;${late?'color:var(--bad);font-weight:700':''}">${t.date}${late?' ⚠':''}</span>`:''}<button class="btn btn-sm" style="color:var(--bad);padding:2px 7px" onclick="delTaskDrawer('${t.id}','${id}')">×</button></div>`;}).join(''):`<div class="empty" style="padding:8px">${jt('등록된 할일이 없습니다','No tasks yet')}</div>`;
  const actHtml=acts.length?acts.map(a=>`<div style="padding:6px 0;border-bottom:1px dashed var(--line);font-size:12px"><span class="chip ${ACT_T[a.type]||'c-gray'}">${jt(a.type,EN[a.type]||a.type)}</span> <span class="muted">${a.date}</span> ${esc(a.content||'')}${a.next&&!a.doneNext?` <span class="chip ${a.nextDate&&a.nextDate<today()?'c-red':'c-amber'}">→ ${esc(a.next)}</span>`:''}</div>`).join(''):`<div class="empty" style="padding:8px">${jt('활동 기록 없음','No activities')}</div>`;
  const canWin=(d.stage==='협의중'||d.stage==='견적발송');
  openDw(jt('딜','Deal')+' · '+jt(d.stage,EN[d.stage]||d.stage), d.client,
    `<div class="dwcard"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
      <div><div class="muted" style="font-size:11px">${jt('제품','Product')}</div><b style="color:var(--ink)">${esc(d.product)||'-'}${d.qty?' × '+d.qty:''}</b></div>
      <div><div class="muted" style="font-size:11px">${jt('예상 금액','Amount')}</div><b style="color:var(--ink)">${fm(d.amt)}</b> <span class="muted" style="font-size:11px">${fkrw(d.amt)}</span></div>
      <div><div class="muted" style="font-size:11px">${jt('성사 확률','Probability')}</div><b style="color:var(--ink)">${d.prob||0}%</b></div>
      <div><div class="muted" style="font-size:11px">${jt('예상 마감','Expected close')}</div><b style="color:${d.expected&&d.expected<today()?'var(--bad)':'var(--ink)'}">${d.expected||'-'}</b></div>
      <div><div class="muted" style="font-size:11px">${jt('담당','Owner')}</div><b style="color:var(--ink)">${esc(d.owner)||'-'}</b></div></div>
      <div style="margin-top:13px"><div class="muted" style="font-size:11px;margin-bottom:6px">${jt('단계 · 클릭하여 이동','Stage · click to move')}</div><div style="display:flex;gap:5px;flex-wrap:wrap">${stageBar}</div></div>
      ${d.memo?`<div class="muted" style="margin-top:11px;font-size:12px;background:#f8fafc;border-radius:7px;padding:8px 10px">${esc(d.memo)}</div>`:''}</div>
    <div class="dwcard"><div class="sect"><span>✅ ${jt('할일 · 다음 액션','Tasks · Next actions')}</span></div>
      ${d.next?`<div style="font-size:12px;color:#059669;background:#ecfdf5;border-radius:7px;padding:7px 9px;margin-bottom:9px">▸ ${esc(d.next)}${d.nextDate?' · '+d.nextDate+(d.nextDate<today()?' ⚠':''):''}</div>`:''}
      ${taskHtml}
      <div style="display:flex;gap:6px;margin-top:10px"><input id="ndt-title" placeholder="${jt('할 일 추가 후 Enter','Add task, then Enter')}" onkeydown="if(event.key==='Enter')addDealTask('${id}')" style="flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px"><input id="ndt-date" type="date" value="${today()}" style="width:135px;padding:8px 10px;border:1px solid var(--line);border-radius:8px"><button class="btn btn-sm btn-primary" onclick="addDealTask('${id}')">+</button></div></div>
    <div class="dwcard"><div class="sect"><span>📞 ${jt('활동','Activities')}</span><button class="btn btn-sm" onclick="closeDw();mAct(null,'${esc(d.client).replace(/'/g,"&#39;")}')">+ ${jt('활동','Activity')}</button></div>${actHtml}</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sm" onclick="closeDw();mDeal('${id}')"><i class="bi bi-pencil"></i> ${jt('상세 수정','Edit deal')}</button>
      ${canWin?`<button class="btn btn-sm" style="color:var(--ok)" onclick="closeDw();wonDeal('${id}')">✓ ${jt('성사 → 수주','Win → Order')}</button>`:''}
      <button class="btn btn-sm" style="color:var(--bad);margin-left:auto" onclick="delDealDrawer('${id}')">${jt('삭제','Delete')}</button></div>`);
}
async function dealStage(id,st){const d=(D.deals||[]).find(x=>x.id===id);if(!d||d.stage===st)return;
  d.stage=st;d.stageAt=today();
  if(st==='계약완료'&&!d.orderId&&confirm(jt('성사! 수주를 자동 생성할까요?','Won! Create an order automatically?')))_dealToOrder(d);
  await saveAll(jt('단계 변경: ','Stage: ')+jt(st,EN[st]||st));openDeal(id);}
async function addDealTask(id){const d=(D.deals||[]).find(x=>x.id===id);if(!d)return;
  const ti=(document.getElementById('ndt-title').value||'').trim(), da=document.getElementById('ndt-date').value;
  if(!ti){toast(jt('할 일을 입력하세요','Enter a task'));return;}
  D.tasks.push({id:uid(),title:ti,date:da||today(),time:'',owner:d.owner||'',memo:'',done:false,dealId:id,client:d.client});
  await saveAll(jt('할일 추가됨','Task added'));openDeal(id);}
async function toggleTaskDrawer(tid,did){const t=(D.tasks||[]).find(x=>x.id===tid);if(t)t.done=!t.done;await saveAll();openDeal(did);}
async function delTaskDrawer(tid,did){D.tasks=(D.tasks||[]).filter(x=>x.id!==tid);await saveAll(jt('삭제됨','Deleted'));openDeal(did);}
async function delDealDrawer(id){if(!confirm(jt('이 딜을 삭제할까요?','Delete this deal?')))return;D.deals=(D.deals||[]).filter(x=>x.id!==id);await saveAll(jt('삭제됨','Deleted'));closeDw();}

// ── 공용 모달 / 드로어 ──
let _onSave=null,_onDel=null;
function openM(title,body,onSave,onDel){_onSave=onSave;_onDel=onDel;
  document.getElementById('modal').innerHTML=`<div class="mh"><h3>${title}</h3><button class="x" onclick="closeM()">×</button></div><div class="mb">${body}</div>
    <div class="mf"><div>${onDel?'<button class="btn" style="color:var(--bad)" onclick="delM()">삭제</button>':''}</div><div style="display:flex;gap:8px"><button class="btn" onclick="closeM()">취소</button><button class="btn btn-primary" onclick="saveM()">저장</button></div></div>`;
  document.getElementById('mbg').style.display='flex';applyLang();}
function closeM(){document.getElementById('mbg').style.display='none';}
async function saveM(){if(_onSave&&await _onSave()===false)return;closeM();}
async function delM(){if(!confirm(jt('삭제할까요?','Delete this item?')))return;if(_onDel)await _onDel();closeM();}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeM();});
function openDw(kicker,title,body){
  document.getElementById('dw').innerHTML=`<div class="dwh"><button class="x" onclick="closeDw()">×</button><div class="k">${kicker}</div><h3>${title}</h3></div><div class="dwb">${body}</div>`;
  document.getElementById('dwbg').style.display='block';document.getElementById('dw').classList.add('open');applyLang();}
function closeDw(){document.getElementById('dw').classList.remove('open');document.getElementById('dwbg').style.display='none';}
