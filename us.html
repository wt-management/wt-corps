const EN_KEYS=Object.keys(EN).filter(k=>k.length>1).sort((a,b)=>b.length-a.length);
function trStr(t){
  if(EN[t]!=null)return EN[t];
  let m;
  if(m=t.match(/^(\d+)월$/))return MONTHS_EN[(+m[1]-1)%12];
  if(m=t.match(/^(\d+)일째$/))return m[1]+'d';
  if(m=t.match(/^(\d+)일$/))return m[1]+'d';
  if(m=t.match(/^(\d+)건$/))return m[1];
  return null;
}
function applyLang(){
  const on=(L==='en');
  ['sidebar','view','dw','modal'].forEach(id=>{
    const root=document.getElementById(id);if(!root)return;
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);let n;
    const nodes=[];while(n=w.nextNode())nodes.push(n);
    nodes.forEach(nd=>{
      if(nd.parentElement&&nd.parentElement.closest('.usr'))return; // 사용자 입력은 trUser가 전담
      if(!on){ if(nd._ko!=null){nd.nodeValue=nd._ko;nd._ko=null;} return; }
      const raw=nd.nodeValue, t=raw.trim(); if(!t)return;
      const ex=trStr(t);
      if(ex!=null){ if(nd._ko==null)nd._ko=raw; nd.nodeValue=raw.replace(t,ex); return; }
      let out=raw;
      for(const k of EN_KEYS){ if(out.indexOf(k)>=0) out=out.split(k).join(EN[k]); }
      if(out!==raw){ if(nd._ko==null)nd._ko=raw; nd.nodeValue=out; }
    });
    root.querySelectorAll('[placeholder]').forEach(el=>{
      if(on){ if(!el._kop)el._kop=el.getAttribute('placeholder')||''; let o=el._kop; const r=trStr(o.trim()); if(r!=null)o=r; else for(const k of EN_KEYS){ if(o.indexOf(k)>=0)o=o.split(k).join(EN[k]); } el.setAttribute('placeholder',o); }
      else if(el._kop!=null){ el.setAttribute('placeholder',el._kop); el._kop=null; }
    });
  });
  const bk=document.getElementById('lang-ko'),be=document.getElementById('lang-en');
  if(bk&&be){bk.style.background=on?'rgba(255,255,255,.04)':'rgba(255,255,255,.12)';bk.style.color=on?'#94a3b8':'#fff';be.style.background=on?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';be.style.color=on?'#fff':'#94a3b8';}
}

const NO_TRANSLATE=['Lavieen']; // 브랜드명 등 번역하지 않고 항상 원문 그대로 표기

function trUser(t){
  t=(t==null?'':String(t));
  if(!t.trim())return esc(t);
  if(NO_TRANSLATE.indexOf(t.trim())>=0)return esc(t);
  var need = (typeof L!=='undefined'&&L==='ko') ? (/[A-Za-z]/.test(t)&&!/[\uac00-\ud7a3]/.test(t)) : (typeof L!=='undefined'&&L==='en' ? /[\uac00-\ud7a3]/.test(t) : false);
  if(!need)return esc(t);
  var key=L+'|'+t;
  if(_trCache[key]!=null)return '<span class="usr" title="'+esc(t)+'">'+esc(_trCache[key])+'</span>';
  return '<span class="usr utr" data-k="'+esc(key)+'" data-s="'+esc(t)+'" title="'+esc(t)+'">'+esc(t)+'</span>';
}

function openProduct(name){

  var orders=(D.orders||[]).filter(function(o){return o.product===name;});

  var rev=sales.reduce(function(a,s){return a+(+s.amt||0);},0);
  var qty=sales.reduce(function(a,s){return a+(+s.qty||0);},0);
  var openD=deals.filter(function(d){return DEAL_OPEN.indexOf(d.stage)>=0;});

    <div class="fr"><div class="fld"><label>${jt('품목','Item')}</label><select id="f-item" onchange="_mvSwitch()">${opts}</select></div><div class="fld"><label>${jt('수량','Qty')}</label><input id="f-qty" type="number" oninput="_mvHint()" value="${m.qty||''}"></div></div>

    async()=>{const g=x=>{var e=document.getElementById(x);return e?e.value:'';};
      const rec={id:id||uid(),date:g('f-date'),type:g('f-type'),item:g('f-item'),qty:Number(g('f-qty'))||0,ref:g('f-ref').trim(),serial:'',client:'',memo:m.memo||''};
      if(!rec.item){toast(jt('품목을 선택하세요','Select an item'));return false;}
      var checked=[].slice.call(document.querySelectorAll('.serck:checked')).map(function(x){return x.value;});
      if(rec.type==='출고'){rec.client=g('f-client');if(checked.length){rec.serial=checked.join(', ');rec.qty=checked.length;}}
      else{rec.serial=(g('f-serial')||'').trim();}
      if(!rec.qty){toast(jt('수량을 입력하세요','Enter quantity'));return false;}
      if(rec.type==='출고'){var curQ=itemQty(rec.item)+(id&&m.type==='출고'&&m.item===rec.item?(+m.qty||0):0);
        if(curQ-rec.qty<0){if(!confirm(jt('현재고가 '+curQ+'개인데 '+rec.qty+'개 출고하면 재고가 '+(curQ-rec.qty)+'개(마이너스)가 됩니다. 그래도 등록할까요?','Current stock is '+curQ+', shipping '+rec.qty+' makes it '+(curQ-rec.qty)+' (negative). Proceed?')))return false;}}
      const i=(D.moves||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.moves[i]=rec;else D.moves.push(rec);

      return await saveAll();},
    id?async()=>{D.moves=D.moves.filter(x=>x.id!==id);await saveAll(jt('삭제됨','Deleted'));}:null);

}

function _pickCount(){var n=document.querySelectorAll('.serck:checked').length;var q=document.getElementById('f-qty');if(q)q.value=n;_mvHint();}
function _ingestSerials(item,serialStr,dateStr,refStr){
  if(!serialStr)return;D.equipment=D.equipment||[];
  serialStr.split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(sn){
    if(D.equipment.some(function(e){return e.serial===sn;}))return;
    D.equipment.push({id:uid(),serial:sn,item:item,status:'재고',client:'',inDate:dateStr||today(),shipRef:refStr||'',outDate:'',outRef:'',note:'',events:[{date:dateStr||today(),type:'입고',detail:refStr||''}]});});
}
function _shipSerials(serials,client,dateStr,refStr){
  (serials||[]).forEach(function(sn){var e=(D.equipment||[]).find(function(x){return x.serial===sn;});
    if(e){e.status='출고';e.client=client||'';e.outDate=dateStr||today();e.outRef=refStr||'';(e.events=e.events||[]).push({date:dateStr||today(),type:'출고',detail:(client||'')+(refStr?' · '+refStr:'')});}});
}

      +(lastIn.length?'<div style="margin-top:7px;padding-top:6px;border-top:1px dashed var(--line)"><div class="muted" style="font-size:10.5px;margin-bottom:3px">📥 '+jt('최근 입고 내역','Recent receipts')+'</div>'+lastIn.map(function(m){return '<div style="font-size:11px;color:var(--body)">'+m.date+' <b style="color:var(--ok)">+'+m.qty+'</b>'+(m.ref?' <span class="muted">'+esc(m.ref)+'</span>':'')+'</div>';}).join('')+'</div>':'')
      +'</div>';

    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px;text-align:center;font-size:11.5px"><div><div class="muted" style="font-size:10px">'+jt('기초','Opening')+'</div><b>'+(+it.qty0||0)+'</b></div><div><div class="muted" style="font-size:10px">'+jt('총 입고','Total in')+'</div><b style="color:var(--ok)">+'+totIn+'</b></div><div><div class="muted" style="font-size:10px">'+jt('총 출고','Total out')+'</div><b style="color:var(--bad)">−'+totOut+'</b></div></div>'

// ── 본사 선적 ↔ 법인 입고 대사 ──────────────────────
function _shipSection(){
  var sh=(D.shipments||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var transit=sh.filter(function(s){return s.status!=='received';});
  var done=sh.filter(function(s){return s.status==='received';});
  var qShip=sh.reduce(function(a,s){return a+(+s.qty||0);},0);
  var qRecv=done.reduce(function(a,s){return a+(+(s.recvQty!=null?s.recvQty:s.qty)||0);},0);
  var qTransit=transit.reduce(function(a,s){return a+(+s.qty||0);},0);
  var disc=done.filter(function(s){return s.recvQty!=null&&(+s.recvQty)!==(+s.qty);}).length;
  var late=transit.filter(function(s){return s.eta&&s.eta<today();}).length;
  var tCards=transit.length?transit.map(function(s){
    var lt=s.eta&&s.eta<today();
    return '<div class="ccard" style="border-left:3px solid '+(lt?'#dc2626':'#f59e0b')+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;color:var(--ink)">'+esc(s.shipRef||'-')+'</div><div style="font-size:11.5px;color:var(--body);margin-top:1px">'+trUser(s.item)+' <b>×'+(+s.qty||0)+'</b></div></div><span class="chip '+(lt?'c-red':'c-amber')+'" style="font-size:10px;flex-shrink:0">'+(lt?jt('지연','LATE'):jt('운송중','TRANSIT'))+'</span></div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between"><span>📤 '+jt('출고','Sent')+' '+(s.date||'-')+'</span><span>🛬 ETA '+(s.eta||'-')+'</span></div>'
      +'<div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-sm btn-primary" style="flex:1;font-weight:700" onclick="receiveShip(\''+s.id+'\')">📥 '+jt('입고 확인','Confirm receipt')+'</button><button class="btn btn-sm" onclick="mShip(\''+s.id+'\')" title="'+jt('선적 수정','Edit')+'"><i class="bi bi-pencil"></i></button></div></div>';
  }).join(''):'<div class="card" style="grid-column:1/-1"><div class="empty" style="padding:20px">'+jt('운송중인 선적이 없습니다 — 발송분 모두 입고 완료 ✓','No shipments in transit — all received ✓')+'</div></div>';
  var recent=done.slice(0,4).map(function(s){var d=s.recvQty!=null&&(+s.recvQty)!==(+s.qty);return '<div onclick="mShip(\''+s.id+'\')" style="display:flex;gap:9px;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12px;cursor:pointer"><span class="chip c-green" style="font-size:10px">'+jt('입고완료','DONE')+'</span><b style="color:var(--ink)">'+esc(s.shipRef||'-')+'</b><span style="flex:1;color:var(--body)">'+trUser(s.item)+' ×'+(+s.qty||0)+'</span>'+(d?'<span class="chip c-red" style="font-size:10px">'+jt('차이','DIFF')+' '+((+s.recvQty)-(+s.qty)>0?'+':'')+((+s.recvQty)-(+s.qty))+'</span>':'')+'<span class="muted" style="font-size:11px">'+(s.receivedDate||'')+'</span></div>';}).join('');
  return '<div class="sect" style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><span>🚢 '+jt('본사 선적 · 입고 대사','HQ Shipments · Receiving')+' <span class="muted" style="font-weight:500;font-size:11px">'+jt('본사 발송 → 법인 입고 매칭','HQ sent → local received')+'</span></span><button class="btn btn-sm" onclick="mShip()">+ '+jt('선적 등록','New shipment')+'</button></div>'
    +'<div class="grid" style="grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px">'
      +'<div class="statcard" style="border-top:3px solid #6366f1"><div class="sv">'+qShip.toLocaleString()+'</div><div class="sl">'+jt('본사 발송 (누계)','HQ sent total')+'</div></div>'
      +'<div class="statcard" style="border-top:3px solid #16a34a;cursor:pointer" onclick="openShipList(\'done\')"><div class="sv" style="color:var(--ok)">'+qRecv.toLocaleString()+'</div><div class="sl">'+jt('법인 입고완료','Received')+'</div></div>'
      +'<div class="statcard" style="border-top:3px solid #f59e0b"><div class="sv" style="color:'+(qTransit?'var(--warn)':'var(--ink)')+'">'+qTransit.toLocaleString()+'</div><div class="sl">'+jt('운송중 (미착)','In transit')+(late?' · <span style="color:var(--bad)">'+jt('지연','late')+' '+late+'</span>':'')+'</div></div>'
      +'<div class="statcard" style="border-top:3px solid '+(disc?'#dc2626':'#94a3b8')+';cursor:pointer" onclick="openShipList(\'mismatch\')"><div class="sv" style="color:'+(disc?'var(--bad)':'var(--ink)')+'">'+disc+'</div><div class="sl">'+jt('수량 불일치','Qty mismatch')+'</div></div></div>'
    +'<div class="cgrid" style="margin-bottom:'+(recent?'12px':'18px')+'">'+tCards+'</div>'
    +(recent?'<div class="card" style="margin-bottom:18px"><div class="sect" style="margin-bottom:6px"><span>✓ '+jt('최근 입고완료','Recently received')+'</span></div>'+recent+'</div>':'');
}
function openShipList(kind){
  var sh=(D.shipments||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var done=sh.filter(function(s){return s.status==='received';});
  var list=kind==='mismatch'?done.filter(function(s){return s.recvQty!=null&&(+s.recvQty)!==(+s.qty);}):done;
  var html=list.length?list.map(function(s){var d=s.recvQty!=null&&(+s.recvQty)!==(+s.qty);return `<div onclick="closeDw();mShip('${s.id}')" style="display:flex;gap:9px;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12px;cursor:pointer"><span class="chip c-green" style="font-size:10px">${jt('입고완료','DONE')}</span><b style="color:var(--ink)">${esc(s.shipRef||'-')}</b><span style="flex:1;color:var(--body)">${trUser(s.item)} ×${(+s.qty||0)}</span>${d?`<span class="chip c-red" style="font-size:10px">${jt('차이','DIFF')} ${((+s.recvQty)-(+s.qty)>0?'+':'')}${((+s.recvQty)-(+s.qty))}</span>`:''}<span class="muted" style="font-size:11px">${s.receivedDate||''}</span></div>`;}).join(''):'<div class="empty">'+jt('해당 선적 없음','No shipments')+'</div>';
  openDw(jt('선적','Shipment'), kind==='mismatch'?jt('수량 불일치 목록','Qty mismatches'):jt('입고완료 전체','All received'), '<div class="dwcard">'+html+'</div>');
}
function mShip(id){
  var s=id?(D.shipments||[]).find(function(x){return x.id===id;}):{shipRef:'',date:today(),item:'',qty:'',eta:'',status:'shipped'};
  if(!s)return;
  var opts='<option value="">'+jt('선택…','Select…')+'</option>'+(D.items||[]).map(function(i){return '<option '+(s.item===i.name?'selected':'')+'>'+esc(i.name)+'</option>';}).join('');

async function seedPsiFromExcel(){

function _psiKey(i){return curYr()+'-'+String(i+1).padStart(2,'0');}
function _psiNeedsUpdate(){
  if(!D.psi||!D.psi.length)return false;
  return PSI_SEED.some(function(seed){
    var existing=(D.psi||[]).find(function(x){return x.model===seed.model;});
    if(!existing)return true;
    for(var i=0;i<12;i++){
      var k=_psiKey(i),mm=existing.months[k]||{};
      if((mm.p||0)!==(seed.p[i]||0)||(mm.s||0)!==(seed.s[i]||0)||(mm.sellable||0)!==(seed.sellable[i]||0)||(mm.nonSellable||0)!==(seed.nonSellable[i]||0))return true;
    }
    return false;
  });
}
async function updatePsiFromExcel(){
  if(!confirm(jt('PSI 데이터를 최신 엑셀 값으로 갱신할까요? 모델별로 입력해둔 연동/비고는 그대로 유지되고, 월별 P/S/Sellable/Non-Sellable 숫자만 최신 값으로 바뀝니다.','Refresh PSI numbers from the latest Excel file? Linked item/remark per model are kept — only monthly P/S/Sellable/Non-Sellable values are updated.')))return;
  PSI_SEED.forEach(function(seed){
    var months={};for(var i=0;i<12;i++){months[_psiKey(i)]={p:seed.p[i]||0,s:seed.s[i]||0,sellable:seed.sellable[i]||0,nonSellable:seed.nonSellable[i]||0};}
    var idx=(D.psi||[]).findIndex(function(x){return x.model===seed.model;});
    if(idx>=0)D.psi[idx].months=months;
    else D.psi.push({id:uid(),model:seed.model,kind:seed.kind,link:'',remark:'',months:months});
  });
  await saveAll(jt('PSI 데이터 갱신됨','PSI data updated'));
}

let dragDeal=null;
let fPipeOwner='',fPipeQ='';
function probColor(p){p=Number(p)||0;return p>=80?'#16a34a':p>=50?'#ea580c':'#adb5bd';}
function vPipe(){
  let ALL=(D.deals||[]).slice();
  const owners=[...new Set(ALL.map(d=>d.owner).filter(Boolean))].sort();
  if(fPipeOwner)ALL=ALL.filter(d=>d.owner===fPipeOwner);
  if(fPipeQ)ALL=ALL.filter(d=>((d.client||'')+' '+(d.product||'')+' '+(d.owner||'')).toLowerCase().includes(fPipeQ.toLowerCase()));
  const stages=DEAL_OPEN.concat(['계약완료']);
  const thisYm=curYm();
  const cols=stages.map(st=>{
    const c=DEAL_ST[st];
    const ds=ALL.filter(d=>d.stage===st).sort((a,b)=>(b.amt||0)-(a.amt||0));
    const amt=ds.reduce((a,d)=>a+(+d.amt||0),0);
    const isWon=st==='계약완료';
    const cards=ds.map(d=>{
      const days=daysBetween(d.stageAt||d.created||today(),today());
      const staleDanger=days>=30&&!isWon, staleWarn=days>=14&&!isWon;
      const daysBadge=`<span class="days" style="background:${staleDanger?'#dc2626':staleWarn?'#f59e0b':'#e5e7eb'};color:${staleDanger||staleWarn?'#fff':'#6b7280'}">${days}일째</span>`;
      const closingThis=d.expected&&d.expected.slice(0,7)===thisYm&&!isWon;
      const overdue=d.expected&&d.expected<today()&&!isWon;
      return `<div class="kcard" draggable="true" data-id="${d.id}" onclick="openDeal('${d.id}')" style="border-left:3px solid ${c}${closingThis?';box-shadow:0 0 0 2px #f59e0b40':overdue?';box-shadow:0 0 0 2px #dc262640':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px"><div class="t">${esc(d.client)}</div>${daysBadge}</div>
        <div class="prod">${esc(d.product)||''}${d.qty?' ×'+d.qty:''}</div>
        <div class="amt">${fm(d.amt)}</div>
        <div class="ft"><span class="owner">${esc(d.owner)||''}</span><span class="prob" style="background:${probColor(d.prob)}">${d.prob||0}%</span></div>
        ${(()=>{const tn=(D.tasks||[]).filter(t=>t.dealId===d.id&&!t.done).length;return tn?`<div style="font-size:10px;color:#4f46e5;margin-top:5px;background:#eef2ff;border-radius:5px;padding:3px 6px"><i class="bi bi-check2-square"></i> ${jt('할일','Tasks')} ${tn}</div>`:'';})()}
        ${d.next?`<div style="font-size:10px;color:#059669;margin-top:5px;background:#ecfdf5;border-radius:5px;padding:3px 6px"><i class="bi bi-arrow-right-circle-fill"></i> ${trUser(d.next)}${d.nextDate?' · '+d.nextDate:''}${d.nextDate&&d.nextDate<today()?' ⚠':''}</div>`:''}
        ${d.expected?`<div class="due" style="${overdue?'color:#dc2626;font-weight:700':closingThis?'color:#d97706;font-weight:700':''}"><i class="bi bi-calendar3"></i> 예상 ${d.expected}${overdue?' ⚠️ 기한초과':closingThis?' · 이달마감':''}</div>`:''}
        ${(st==='협의중'||st==='견적발송')?`<div style="margin-top:6px"><button class="btn btn-sm" style="color:var(--ok);width:100%" onclick="event.stopPropagation();wonDeal('${d.id}')">✓ 성사 → 수주 생성</button></div>`:''}
      </div>`;}).join('');
    return `<div class="kbcol" data-st="${st}">
      <div class="kbhead" style="background:${isWon?'#f0fdf4':'#f8faff'};border-left:3px solid ${c}">
        <div class="r1"><span class="nm" style="color:${c}">${st}</span><span class="cnt" style="background:${c}">${ds.length}</span></div>
        <div class="amt">${fm(amt)}</div></div>
      <div class="kbbody" data-st="${st}" style="min-height:60px">${cards||'<div class="kbempty"><i class="bi bi-inbox" style="font-size:22px;display:block;margin-bottom:4px"></i>딜 없음</div>'}</div>
    </div>`;}).join('');
  const open=ALL.filter(d=>DEAL_OPEN.includes(d.stage));
  const w=open.reduce((a,d)=>a+(+d.amt||0)*(+d.prob||0)/100,0);
  const closing=open.filter(d=>d.expected&&d.expected.slice(0,7)===thisYm);
  return head('🎯 딜 파이프라인','카드를 끌어 단계 이동 · 성사 시 수주 자동 생성 · 클릭 → 수정',
    `<input class="sel" placeholder="🔍 고객사·제품·담당" value="${esc(fPipeQ)}" oninput="fPipeQ=this.value" onkeydown="if(event.key==='Enter')render()" style="width:170px">`+
    `<select class="sel" onchange="fPipeOwner=this.value;render()"><option value="">담당 전체</option>${owners.map(o=>`<option ${fPipeOwner===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`+
    `${(fPipeOwner||fPipeQ)?'<button class="btn btn-sm" onclick="fPipeOwner=\'\';fPipeQ=\'\';render()">초기화</button>':''}`+
    `<button class="btn btn-sm" onclick="csvDeals()"><i class="bi bi-download"></i> CSV</button><button class="btn btn-primary" onclick="mDeal()">+ 딜 등록</button>`)
    +`<div class="grid kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
      <div class="kpi"><div class="v">${open.length}</div><div class="l">진행 딜</div><div class="s">${fmS(open.reduce((a,d)=>a+(+d.amt||0),0))}</div></div>

      <div class="kpi"><div class="v" style="color:${closing.length?'var(--warn)':'var(--ink)'}">${closing.length}</div><div class="l">이달 마감 예정</div><div class="s">${fmS(closing.reduce((a,d)=>a+(+d.amt||0),0))}</div></div>
      <div class="kpi"><div class="v">${(D.deals||[]).filter(d=>d.stage==='계약완료').length}</div><div class="l">성사 누적</div></div></div>
    <div class="kb">${cols}</div></div>`;
}
function bindKb(){
  document.querySelectorAll('.kcard[draggable]').forEach(c=>{
    c.addEventListener('dragstart',()=>{dragDeal=c.dataset.id;c.classList.add('drag');});
    c.addEventListener('dragend',()=>{c.classList.remove('drag');document.querySelectorAll('.kbbody.over').forEach(x=>x.classList.remove('over'));});});
  document.querySelectorAll('.kbcol').forEach(b=>{
    b.addEventListener('dragover',e=>{e.preventDefault();b.classList.add('over');});
    b.addEventListener('dragleave',()=>b.classList.remove('over'));
    b.addEventListener('drop',async e=>{e.preventDefault();b.classList.remove('over');
      const d=(D.deals||[]).find(x=>x.id===dragDeal);dragDeal=null;
      if(!d||d.stage===b.dataset.st)return;
      d.stage=b.dataset.st;d.stageAt=today();
      if(d.stage==='계약완료'&&!d.orderId&&confirm(jt('성사! 수주를 자동 생성할까요?','Won! Create an order automatically?')))_dealToOrder(d);
      await saveAll('단계 이동: '+d.stage);});});
}

    <div class="fld"><label>메모</label><input id="f-memo" value="${esc(d.memo||'')}"></div>`,

      if(!rec.client){toast('고객사를 입력하세요');return false;}
      const i=(D.deals||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.deals[i]=rec;else D.deals.push(rec);return await saveAll();},
    id?async()=>{D.deals=D.deals.filter(x=>x.id!==id);await saveAll('삭제됨');}:null);
}
function _dealToOrder(d){const o={id:uid(),date:today(),client:d.client,product:d.product,qty:d.qty,amt:d.amt,status:'수주',eta:d.expected||'',memo:'딜 성사 전환'};D.orders.push(o);d.orderId=o.id;}
async function wonDeal(id){const d=(D.deals||[]).find(x=>x.id===id);if(!d)return;

}

let schMode='today', schRef=new Date();
const SCH_KIND={'할일':{c:'#4f46e5',i:'✅',en:'Task'},'딜':{c:'#7c3aed',i:'🎯',en:'Deal action'},'후속':{c:'#ea580c',i:'📞',en:'Follow-up'},'납기':{c:'#0891b2',i:'🚚',en:'Order ETA'}};
function schWeekDays(ref){const x=new Date(ref);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);const a=[];for(let i=0;i<7;i++){const d=new Date(x);d.setDate(d.getDate()+i);a.push(d);}return a;}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function schItems(){
  const out=[];
  (D.tasks||[]).forEach(t=>{if(t.date)out.push({date:t.date,time:t.time||'',kind:'할일',title:t.title,owner:t.owner||'',done:!!t.done,ref:'task',id:t.id});});
  (D.deals||[]).filter(d=>DEAL_OPEN.includes(d.stage)&&d.next&&d.nextDate).forEach(d=>out.push({date:d.nextDate,time:'',kind:'딜',title:d.client+' · '+d.next,owner:d.owner||'',done:false,ref:'deal',id:d.id}));
  (D.acts||[]).filter(a=>a.next&&a.nextDate&&!a.doneNext).forEach(a=>out.push({date:a.nextDate,time:'',kind:'후속',title:a.client+' · '+a.next,owner:'',done:false,ref:'act',id:a.id}));
  (D.orders||[]).filter(o=>o.eta&&o.status!=='납품완료'&&o.status!=='취소').forEach(o=>out.push({date:o.eta,time:'',kind:'납기',title:o.client+' '+(o.product||'')+(L==='en'?' delivery':' 납기'),owner:'',done:false,ref:'order',id:o.id}));
  return out;
}
function schClick2(ref,id){if(ref==='task'){const t=(D.tasks||[]).find(x=>x.id===id);if(t&&t.dealId)return openDeal(t.dealId);return mTask(id);}if(ref==='deal')return openDeal(id);if(ref==='act')return setView('acts');if(ref==='order')return mOrder(id);}
async function toggleTask(id){const t=(D.tasks||[]).find(x=>x.id===id);if(!t)return;t.done=!t.done;await saveAll(t.done?jt('완료','Done'):jt('해제','Reopened'));}

function schNav(delta){if(schMode==='week')schRef.setDate(schRef.getDate()+delta*7);else schRef.setMonth(schRef.getMonth()+delta);schRef=new Date(schRef);render();}

function schMonth(){

    `<div class="dwcard"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">

      <div><div class="muted" style="font-size:11px">${jt('성사 확률','Probability')}</div><b style="color:var(--ink)">${d.prob||0}%</b></div>

async function dealStage(id,st){const d=(D.deals||[]).find(x=>x.id===id);if(!d||d.stage===st)return;
  d.stage=st;d.stageAt=today();
  if(st==='계약완료'&&!d.orderId&&confirm(jt('성사! 수주를 자동 생성할까요?','Won! Create an order automatically?')))_dealToOrder(d);
  await saveAll(jt('단계 변경: ','Stage: ')+jt(st,EN[st]||st));openDeal(id);}
async function addDealTask(id){const d=(D.deals||[]).find(x=>x.id===id);if(!d)return;
  const ti=(document.getElementById('ndt-title').value||'').trim(), da=document.getElementById('ndt-date').value;
  if(!ti){toast(jt('할 일을 입력하세요','Enter a task'));return;}
  D.tasks.push({id:uid(),title:ti,date:da||today(),time:'',owner:d.owner||'',memo:'',done:false,dealId:id,client:d.client});
  await saveAll(jt('할일 추가됨','Task added'));openDeal(id);}
async function toggleTaskDrawer(tid,did){const t=(D.tasks||[]).find(x=>x.id===tid);if(t)t.done=!t.done;await saveAll();openDeal(did);}
async function delTaskDrawer(tid,did){D.tasks=(D.tasks||[]).filter(x=>x.id!==tid);await saveAll(jt('삭제됨','Deleted'));openDeal(did);}
async function delDealDrawer(id){if(!confirm(jt('이 딜을 삭제할까요?','Delete this deal?')))return;D.deals=(D.deals||[]).filter(x=>x.id!==id);await saveAll(jt('삭제됨','Deleted'));closeDw();}

// ── 본사 관리 (HQ Console) : 건전성·원화환산·본사자금·추이 통합 ──
function _hqLightColor(s){return s==='g'?'#16a34a':s==='y'?'#f59e0b':'#dc2626';}
function saveSnapshot(){
  var yr=curYr(),mo=+curYm().slice(5,7);
  var sm=salesMonthly(yr),pm=payMonthly(yr),tm=tgtMonthly(yr);
  var ySale=ytd(sm,mo),yPay=ytd(pm,mo),yTgt=ytd(tm,mo),out=totalOut(),bal=fundsBal();
  var snap={ym:curYm(),sale:ySale,pay:yPay,out:out,bal:bal,achv:pct(ySale,yTgt),payRate:pct(yPay,ySale),rate:D.rate,at:today()};
  D.snapshots=(D.snapshots||[]).filter(function(s){return s.ym!==snap.ym;});
  D.snapshots.push(snap);
  saveAll(jt('스냅샷 저장됨','Snapshot saved'));
}
function vHQ(){
  var yr=curYr(),mo=+curYm().slice(5,7);
  var sm=salesMonthly(yr),pm=payMonthly(yr),tm=tgtMonthly(yr);
  var ySale=ytd(sm,mo),yPay=ytd(pm,mo),yTgt=ytd(tm,mo);
  var achv=pct(ySale,yTgt),payRate=pct(yPay,ySale);
  var out=totalOut(),bal=fundsBal();
  var ag90=(D.sales||[]).reduce(function(a,x){return a+(agingBucket(x)==='90+'?outAmt(x):0);},0);
  var ar90pct=out?ag90/out*100:0;
  var low=(D.items||[]).filter(function(i){return itemQty(i.name)<(+i.safety||0);});
  var sc=[
    {ic:'🎯',l:jt('목표 달성률','Target Achv.'),v:yTgt?achv.toFixed(0)+'%':'-',s:achv>=100?'g':achv>=70?'y':'r',sub:jt('누적','YTD')+' '+fmS(ySale)+' / '+fmS(yTgt),why:jt('목표 대비 70% 미만','below 70% of target'),go:"setView('report')"},
    {ic:'💰',l:jt('수금률','Collection'),v:ySale?payRate.toFixed(0)+'%':'-',s:payRate>=90?'g':payRate>=65?'y':'r',sub:jt('수금','collected')+' '+fmS(yPay),why:jt('수금률 90% 미만','collection under 90%'),go:"setView('sales')"},
    {ic:'⏳',l:jt('미수 건전성','AR Health'),v:fmS(out),s:ar90pct<10?'g':ar90pct<30?'y':'r',sub:'90d+ '+ar90pct.toFixed(0)+'% · '+fmS(ag90),why:jt('90일+ 장기미수 비중 높음','high 90d+ AR ratio'),go:"setView('ar')"},
    {ic:'🏦',l:jt('자금 여력','Liquidity'),v:fmS(bal),s:bal>50000?'g':bal>0?'y':'r',sub:fkrw(bal),why:jt('자금 잔액 낮음','low cash balance'),go:"setView('funds')"},
    {ic:'📦',l:jt('재고 상태','Inventory'),v:low.length?low.length+jt('개 부족',' low'):jt('정상','OK'),s:low.length===0?'g':low.length<=2?'y':'r',sub:jt('전체','of')+' '+(D.items||[]).length+jt('품목',' items'),why:jt('안전재고 미달 품목','items below safety'),go:"setView('inv')"}
  ];
  var reds=sc.filter(function(x){return x.s==='r';}),yels=sc.filter(function(x){return x.s==='y';});
  var overall=reds.length?'r':yels.length?'y':'g';
  var ovLabel=overall==='g'?jt('양호 · 순항 중','Healthy'):overall==='y'?jt('주의 관찰','Watch'):jt('경고 · 조치 필요','Action needed');
  var scHtml=sc.map(function(c){var col=_hqLightColor(c.s);
    return `<div onclick="${c.go}" style="background:#fff;border:1px solid var(--line);border-left:4px solid ${col};border-radius:12px;padding:13px 15px;cursor:pointer;box-shadow:var(--sh)">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px"><span>${c.ic}</span><span style="font-size:11.5px;color:var(--muted);font-weight:600">${c.l}</span><span style="margin-left:auto;width:10px;height:10px;border-radius:50%;background:${col}"></span></div>
      <div style="font-size:20px;font-weight:800;color:var(--ink);line-height:1">${c.v}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${c.sub}</div></div>`;}).join('');
  // 조치 필요 사유 배너
  var issues=reds.concat(yels);
  var issueBanner=issues.length?`<div class="card" style="margin-bottom:14px;border-left:4px solid ${_hqLightColor(overall)};padding:12px 16px"><div style="font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px">${overall==='r'?'🔴':'🟡'} ${jt('점검 필요 항목','Items to review')} (${issues.length})</div><div style="display:flex;flex-wrap:wrap;gap:8px">${issues.map(function(c){return `<span onclick="${c.go}" style="cursor:pointer;font-size:12px;background:${_hqLightColor(c.s)}18;color:${_hqLightColor(c.s)};border-radius:7px;padding:4px 10px;font-weight:600">${c.ic} ${c.l} · ${c.v}</span>`;}).join('')}</div></div>`:`<div class="card" style="margin-bottom:14px;border-left:4px solid #16a34a;padding:12px 16px;font-size:12.5px;color:var(--ok);font-weight:600">🟢 ${jt('모든 지표 양호 — 특이사항 없음','All indicators healthy')}</div>`;
  // 원화 환산
  var krwRow=function(label,usd,go){return `<div onclick="${go}" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line)"><span style="font-size:12.5px;color:var(--body)">${label}</span><span style="text-align:right"><b style="color:var(--ink)">${fm(usd)}</b> <span class="muted" style="font-size:11.5px">${fkrw(usd)}</span></span></div>`;};
  var krw=`<div class="card"><div class="sect"><span>💱 ${jt('원화 환산 종합','KRW Consolidated')}</span><span class="muted" style="font-size:11.5px;cursor:pointer" onclick="setRate()">${SYM}1 = ₩${(D.rate||0).toLocaleString()} ✎</span></div>
    ${krwRow(jt('연 누적 매출','YTD Revenue'),ySale,"setView('sales')")}
    ${krwRow(jt('연 누적 수금','YTD Collections'),yPay,"setView('sales')")}
    ${krwRow(jt('미수채권','Receivables'),out,"setView('ar')")}
    ${krwRow(jt('자금 잔액','Cash Balance'),bal,"setView('funds')")}
    <div style="font-size:11px;color:var(--muted);margin-top:8px">${jt('환율은 전 화면 원화 병기에 공통 적용','FX applies across all KRW figures')}</div></div>`;
  // 본사↔법인 자금
  var hqIn=(D.funds||[]).filter(function(f){return f.kind==='입금'&&/본사|hq|remit|본점/i.test((f.category||'')+' '+(f.memo||''));});
  var hqOut=(D.funds||[]).filter(function(f){return f.kind==='출금'&&/본사|정산|배당|dividend|settle|본점/i.test((f.category||'')+' '+(f.memo||''));});
  var inSum=hqIn.reduce(function(a,f){return a+(+f.amt||0);},0),outSum=hqOut.reduce(function(a,f){return a+(+f.amt||0);},0),net=inSum-outSum;
  var flowRows=(hqIn.concat(hqOut)).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).slice(0,5).map(function(f){var isIn=f.kind==='입금';
    return `<div style="display:flex;gap:9px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12px"><span class="muted">${f.date}</span><span class="chip ${isIn?'c-blue':'c-gray'}">${isIn?jt('투입','in'):jt('회수','out')}</span><span style="flex:1">${esc(f.category||f.memo||'')}</span><b style="color:${isIn?'#2563eb':'var(--body)'}">${isIn?'+':'-'}${fm(f.amt)}</b></div>`;}).join('')||('<div class="empty" style="font-size:11.5px">'+jt('자금관리에서 항목명에 "본사" 포함해 등록하면 집계됩니다','Tag category with "본사/HQ" in Cash Mgmt')+'</div>');
  var hqFund=`<div class="card"><div class="sect"><span>🔄 ${jt('본사 ↔ 법인 자금','HQ ↔ Subsidiary')}</span><span class="muted" style="font-size:11.5px;cursor:pointer" onclick="setView('funds')">${jt('자금관리','Cash Mgmt')} →</span></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;margin-bottom:8px">
      <div><div class="muted" style="font-size:11px">${jt('본사 투입','Injected')}</div><div style="font-size:18px;font-weight:800;color:#2563eb">+${fmS(inSum)}</div></div>
      <div style="border-left:1px solid var(--line);border-right:1px solid var(--line)"><div class="muted" style="font-size:11px">${jt('회수','Returned')}</div><div style="font-size:18px;font-weight:800;color:var(--body)">-${fmS(outSum)}</div></div>
      <div><div class="muted" style="font-size:11px">${jt('순 투자','Net')}</div><div style="font-size:18px;font-weight:800;color:var(--ink)">${fmS(net)}</div><div class="muted" style="font-size:10.5px">${fkrw(net)}</div></div></div>
    ${flowRows}</div>`;
  // 건전성 추이 (개선: Y축·값·영역·표)
  var snaps=(D.snapshots||[]).slice().sort(function(a,b){return (a.ym||'').localeCompare(b.ym||'');});
  var trend;
  if(snaps.length>=2){
    var W=snaps.length, xs=function(i){return (W===1?50:i/(W-1)*100);};
    var yScale=function(v){return 100-Math.max(0,Math.min(100,v));};   // 0~100%
    var mk=function(key,color,fill){
      var pts=snaps.map(function(s,i){return [xs(i),yScale(s[key]||0)];});
      var line=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
      var area=fill?('<polygon points="0,100 '+line+' 100,100" fill="'+color+'" opacity="0.08"/>'):'';
      var dots=pts.map(function(p,i){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(i===pts.length-1?2.6:1.8)+'" fill="'+color+'"/>';}).join('');
      return area+'<polyline points="'+line+'" fill="none" stroke="'+color+'" stroke-width="2" vector-effect="non-scaling-stroke"/>'+dots;
    };
    var grid=[0,25,50,75,100].map(function(g){var y=yScale(g);return '<line x1="0" y1="'+y+'" x2="100" y2="'+y+'" stroke="#eef1f5" stroke-width="0.5" vector-effect="non-scaling-stroke"/>';}).join('');
    var yaxis=[100,50,0].map(function(g){return '<div style="flex:1;font-size:9px;color:#cbd5e1">'+g+'%</div>';}).join('');
    var last=snaps[snaps.length-1];
    var lastLbl='<div style="position:absolute;top:6px;right:8px;font-size:11px"><span style="color:#4f46e5;font-weight:700">'+jt('목표','Tgt')+' '+(last.achv||0).toFixed(0)+'%</span> &nbsp; <span style="color:#16a34a;font-weight:700">'+jt('수금','Col')+' '+(last.payRate||0).toFixed(0)+'%</span></div>';
    var months='<div style="display:flex;margin-left:26px">'+snaps.map(function(s){return '<span style="flex:1;text-align:center;font-size:10.5px;color:var(--muted)">'+(+s.ym.slice(5))+jt('월','')+'</span>';}).join('')+'</div>';
    // 월별 표
    var rows=snaps.slice().reverse().map(function(s){return `<tr><td class="l">${s.ym}</td><td>${fmS(s.sale)}</td><td>${(s.achv||0).toFixed(0)}%</td><td>${(s.payRate||0).toFixed(0)}%</td><td>${fmS(s.out)}</td><td>${fmS(s.bal)}</td></tr>`;}).join('');
    trend=`<div class="card"><div class="sect"><span>📈 ${jt('건전성 추이','Health Trend')}</span><button class="btn btn-sm" onclick="saveSnapshot()"><i class="bi bi-camera"></i> ${jt('이번달 스냅샷','Snapshot')}</button></div>
      <div style="position:relative;display:flex;gap:6px">
        <div style="display:flex;flex-direction:column;justify-content:space-between;height:150px;padding:2px 0">${yaxis}</div>
        <div style="flex:1;position:relative">${lastLbl}<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:150px">${grid}${mk('achv','#4f46e5',true)}${mk('payRate','#16a34a',false)}</svg></div>
      </div>${months}
      <div style="margin-top:14px;overflow:auto"><table style="font-size:12px"><thead><tr><th class="l">${jt('월말','Month')}</th><th>${jt('누적매출','YTD Rev')}</th><th>${jt('달성','Achv')}</th><th>${jt('수금률','Coll%')}</th><th>${jt('미수','AR')}</th><th>${jt('자금','Cash')}</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } else {
    trend=`<div class="card"><div class="sect"><span>📈 ${jt('건전성 추이','Health Trend')}</span><button class="btn btn-primary btn-sm" onclick="saveSnapshot()"><i class="bi bi-camera"></i> ${jt('이번달 스냅샷 저장','Save Snapshot')}</button></div>
      <div class="empty">${jt('매월 스냅샷을 저장하면 목표달성·수금률·미수·자금 추세가 쌓입니다. (현재 '+snaps.length+'개)','Save monthly snapshots to build the trend. ('+snaps.length+' saved)')}</div></div>`;
  }
  return head('🏢 '+jt('본사 관리','HQ Console'), jt('본사에서 미국법인을 원격 감독 · 건전성·자금·원화·추이','HQ oversight of WONTECH USA'),
    `<span class="chip ${overall==='g'?'c-green':overall==='y'?'c-amber':'c-red'}" style="font-size:12px;padding:5px 10px">● ${ovLabel}</span><button class="btn btn-sm" onclick="saveSnapshot()"><i class="bi bi-camera"></i> ${jt('스냅샷','Snapshot')}</button>`)
    +`<div class="grid hqsc" style="grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px">${scHtml}</div>`
    +issueBanner
    +`<div class="grid dash2col" style="grid-template-columns:1fr 1fr;margin-bottom:14px">${krw}${hqFund}</div>`
    +trend+'</div>';
}

let _onSave=null,_onDel=null;
function openM(title,body,onSave,onDel){_onSave=onSave;_onDel=onDel;
  document.getElementById('modal').innerHTML=`<div class="mh"><h3>${title}</h3><button class="x" onclick="closeM()">×</button></div><div class="mb">${body}</div>
    <div class="mf"><div>${onDel?'<button class="btn" style="color:var(--bad)" onclick="delM()">삭제</button>':''}</div><div style="display:flex;gap:8px"><button class="btn" onclick="closeM()">취소</button><button class="btn btn-primary" onclick="saveM()">저장</button></div></div>`;
  document.getElementById('mbg').style.display='flex';applyLang();
  setTimeout(function(){var m=document.getElementById('modal');var el=[].slice.call(m.querySelectorAll('input,select,textarea')).find(function(x){return x.type!=='date'&&x.type!=='time'&&x.type!=='checkbox'&&!x.disabled;});if(el){el.focus();if(el.select)try{el.select();}catch(e){}}},60);}
function closeM(){document.getElementById('mbg').style.display='none';}
async function saveM(){if(_onSave&&await _onSave()===false)return;closeM();}
async function delM(){if(!confirm(jt('삭제할까요?','Delete this item?')))return;if(_onDel)await _onDel();closeM();}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeM();});
function openDw(kicker,title,body){

function openSearch(){closeSidebar();

  document.getElementById('mbg').style.display='flex';
  setTimeout(function(){var g=document.getElementById('gq');if(g)g.focus();},60);}
function _srow(ic,title,sub,go){return '<div data-go="1" onclick="'+go+'" style="display:flex;gap:10px;align-items:center;padding:8px 7px;border-radius:8px;cursor:pointer" onmouseover="this.style.background=\'#f4f6fb\'" onmouseout="this.style.background=\'\'"><span>'+ic+'</span><div style="flex:1;min-width:0"><div style="font-weight:600;color:var(--ink);font-size:13px">'+esc(title)+'</div>'+(sub?'<div class="muted" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sub)+'</div>':'')+'</div><i class="bi bi-arrow-return-left" style="color:#cbd5e1;font-size:11px"></i></div>';}
function _sgrp(t,rows){return '<div style="font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 3px">'+t+'</div>'+rows.join('');}
function gSearch(){
  var q=(document.getElementById('gq').value||'').trim().toLowerCase();var res=document.getElementById('gres');
  if(!q){res.innerHTML='<div class="empty">'+jt('검색어를 입력하세요','Type to search')+'</div>';return;}
  var out='',esq=function(c){return esc(c).replace(/'/g,"&#39;");};
  var cls=clientList().filter(function(c){return c.toLowerCase().indexOf(q)>=0;}).slice(0,6);
  if(cls.length)out+=_sgrp(jt('거래처','Clients'),cls.map(function(c){return _srow('🏢',c,'',"openClient('"+esq(c)+"');closeM()");}));
  var dl=(D.deals||[]).filter(function(d){return ((d.client||'')+' '+(d.product||'')).toLowerCase().indexOf(q)>=0;}).slice(0,6);
  if(dl.length)out+=_sgrp(jt('딜','Deals'),dl.map(function(d){return _srow('🎯',d.client,(d.product||'')+' · '+fm(d.amt)+' · '+jt(d.stage,EN[d.stage]||d.stage),"openDeal('"+d.id+"');closeM()");}));
  var sl=(D.sales||[]).filter(function(s){return ((s.client||'')+' '+(s.product||'')).toLowerCase().indexOf(q)>=0;}).slice(0,5);
  if(sl.length)out+=_sgrp(jt('매출','Sales'),sl.map(function(s){return _srow('🧾',s.client,s.date+' · '+(s.product||'')+' · '+fm(s.amt),"dwSale('"+s.id+"');closeM()");}));
  var ac=(D.acts||[]).filter(function(a){return ((a.client||'')+' '+(a.content||'')+' '+(a.next||'')).toLowerCase().indexOf(q)>=0;}).slice(0,5);
  if(ac.length)out+=_sgrp(jt('활동','Activities'),ac.map(function(a){return _srow('📞',a.client,a.date+' · '+(a.content||''),"setView('acts');closeM()");}));
  res.innerHTML=out||'<div class="empty">'+jt('결과 없음','No results')+'</div>';
}
// 편의: ESC 닫기 · Enter 저장(입력창 한정) · Ctrl/⌘+K 검색
document.addEventListener('keydown',function(e){
  var modalOpen=document.getElementById('mbg').style.display==='flex';
  var dwOpen=document.getElementById('dw').classList.contains('open');
  if((e.key==='k'||e.key==='K')&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); if(document.getElementById('app').style.display!=='none')openSearch(); return; }
  if(e.key==='Escape'){ if(modalOpen)closeM(); else if(dwOpen)closeDw(); }
  else if(e.key==='Enter'&&modalOpen&&e.target&&e.target.tagName==='INPUT'&&e.target.type!=='checkbox'&&e.target.id!=='gq'){ e.preventDefault(); saveM(); }
});
boot();
