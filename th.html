<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wontech</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇹🇭</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#f6f7f9;--card:#fff;--line:#e8ebf0;--line2:#f1f3f5;--ink:#0f172a;--body:#475569;--muted:#94a3b8;--brand:#b45309;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--body);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.1px;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
.hidden{display:none!important}
#boot-ov{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;z-index:200}
#app{display:none}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:236px;background:#0f172a;color:#94a3b8;display:flex;flex-direction:column;z-index:20}
.brand{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .lg{width:32px;height:32px;border-radius:9px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:17px}
.brand b{color:#fff;font-size:14px}.brand small{display:block;color:#64748b;font-size:10.5px}
.nav{flex:1;padding:14px 12px;overflow:auto}
.nav .grp{font-size:10.5px;font-weight:700;color:#475569;letter-spacing:.08em;padding:6px 12px 8px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;color:#cbd5e1;font-weight:500;margin-bottom:2px;cursor:pointer}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}.nav a.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
.nav .ico{width:18px;text-align:center}
.acct{margin:8px 12px 4px;background:#1e293b;border:1px solid #334155;border-radius:11px;padding:10px 11px}
.acct .row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.acct .av{width:30px;height:30px;border-radius:50%;background:#ff4500;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:13px}
.acct .nm{font-size:12px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct .em{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct .btns{display:flex;gap:5px}
.acct .btns button{flex:1;background:rgba(255,255,255,.06);border:1px solid #334155;border-radius:7px;padding:6px 0;color:#94a3b8;font-size:11px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.acct .btns button:hover{background:rgba(255,255,255,.12);color:#fff}
.switch-wrap{padding:6px 12px 4px;position:relative}
.switch-btn{width:100%;background:rgba(255,255,255,.05);border:1px solid #334155;border-radius:9px;padding:9px 11px;color:#94a3b8;font-size:12px;display:flex;align-items:center;gap:7px}
.switch-btn:hover{background:rgba(255,255,255,.1)}
.switch-dd{display:none;position:absolute;bottom:106%;left:12px;right:12px;background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;box-shadow:0 -10px 30px rgba(0,0,0,.5);z-index:30;padding:6px;max-height:60vh;overflow-y:auto}
.switch-dd.open{display:block}
.sw-item{margin-top:2px;border-radius:7px;padding:8px 11px;display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:12px;cursor:pointer}
.sw-item:hover{background:rgba(255,255,255,.1)}.sw-item.cur{color:#fff;font-weight:700;background:rgba(255,255,255,.14)}
.sw-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:18px;color:#fff;border-radius:5px;font-size:10px;font-weight:700;padding:0 5px}
#main{margin-left:236px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:15;background:rgba(246,247,249,.9);backdrop-filter:blur(8px);padding:18px 28px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.topbar h2{font-size:20px;font-weight:800;color:var(--ink)}
.topbar .desc{color:var(--muted);font-size:12.5px;margin-top:3px}
.wrap{padding:20px 28px 50px}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 13px;font-weight:600;font-size:13px;color:var(--ink);display:inline-flex;align-items:center;gap:6px;box-shadow:var(--sh)}
.btn:hover{background:#f8fafc}.btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn-primary:hover{filter:brightness(.92)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px;box-shadow:none}
.sel{padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:var(--sh);font-size:12.5px}
.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 17px;box-shadow:var(--sh)}
.kpi .v{font-size:22px;font-weight:800;color:var(--ink);line-height:1.1}.kpi .l{font-size:12px;color:var(--muted);margin-top:6px}.kpi .s{font-size:11px;color:var(--muted);margin-top:4px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--sh)}
.sect{font-size:14.5px;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.c-blue{background:#e0e7ff;color:#4338ca}.c-green{background:#dcfce7;color:#15803d}.c-amber{background:#fef3c7;color:#b45309}.c-red{background:#fee2e2;color:#b91c1c}.c-gray{background:#eef1f5;color:#475569}.c-cyan{background:#cffafe;color:#0e7490}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:9px 12px;border-bottom:1px solid var(--line2)}
th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;background:#fafbfc}
td.l,th.l{text-align:left}
tbody tr{cursor:pointer}tbody tr:hover td{background:#f8f9ff}
.bar{height:7px;background:#f1f5f9;border-radius:6px;overflow:hidden}.bar>i{display:block;height:100%;border-radius:6px;background:var(--brand)}
.muted{color:var(--muted)}.up{color:var(--ok)}.dn{color:var(--bad)}
.empty{text-align:center;color:var(--muted);padding:28px;font-size:13px}
#mbg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal{background:#fff;border-radius:16px;width:500px;max-width:100%;max-height:92vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.mh h3{font-size:16px}.mh .x{border:0;background:transparent;font-size:22px;color:var(--muted);cursor:pointer}
.mb{padding:20px 22px}.fld{margin-bottom:13px}.fld label{display:block;font-size:12.5px;font-weight:600;color:var(--body);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fafbfc}.fld textarea{resize:vertical;min-height:56px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;z-index:90;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1}
@media(max-width:820px){#sidebar{width:60px}.brand b,.brand small,.nav .grp,.nav a span.lbl,.acct,.switch-btn span{display:none}#main{margin-left:60px}.topbar,.wrap{padding-left:14px;padding-right:14px}.nav a{justify-content:center}.fr3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="boot-ov"><i class="bi bi-arrow-repeat" style="margin-right:8px"></i>불러오는 중…</div>

<div id="app">
  <aside id="sidebar">
    <div class="brand"><div class="lg">🇹🇭</div><div><b>태국법인</b><small>WONTECH ASIA (TH)</small></div></div>
    <nav class="nav" id="nav">
      <div class="grp">경영</div>
      <a class="active" data-v="dash"><span class="ico">📊</span><span class="lbl">경영 대시보드</span></a>
      <div class="grp">영업</div>
      <a data-v="sales"><span class="ico">💰</span><span class="lbl">매출 관리</span></a>
      <a data-v="orders"><span class="ico">📝</span><span class="lbl">수주 관리</span></a>
      <div class="grp">운영</div>
      <a data-v="inv"><span class="ico">📦</span><span class="lbl">물류 · 재고</span></a>
      <a data-v="funds"><span class="ico">🏦</span><span class="lbl">자금 관리</span></a>
      <a data-v="exp"><span class="ico">🧾</span><span class="lbl">비용 · 인건비</span></a>
    </nav>
    <div class="acct"><div class="row"><div class="av" id="uav">P</div><div style="flex:1;min-width:0"><div class="nm" id="unm">-</div><div class="em" id="uem">-</div></div></div>
      <div class="btns"><button onclick="changePw()"><i class="bi bi-key"></i> 비밀번호</button><button onclick="doLogout()"><i class="bi bi-box-arrow-right"></i> 로그아웃</button></div></div>
    <div class="switch-wrap"><button class="switch-btn" onclick="document.getElementById('swdd').classList.toggle('open')"><i class="bi bi-grid-3x3-gap"></i><span style="flex:1;text-align:left;font-weight:600">사이트 이동</span><i class="bi bi-chevron-up" style="font-size:10px"></i></button>
      <div class="switch-dd" id="swdd">
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/total.html')"><span class="sw-badge" style="background:#4f46e5">종합</span><span style="flex:1">전사 종합 경영현황</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/')"><span class="sw-badge" style="background:#0891b2">KR</span><span style="flex:1">한국 영업</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/intl.html')"><span class="sw-badge" style="background:#0d9488">INT</span><span style="flex:1">해외 영업</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wtj-management/')"><span class="sw-badge" style="background:#f59e0b">JP</span><span style="flex:1">일본법인 관리</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wt-corps/us.html')"><span class="sw-badge" style="background:#1e3a8a">US</span><span style="flex:1">미국법인 관리</span></div>
        <div class="sw-item cur"><span class="sw-badge" style="background:#b45309">TH</span><span style="flex:1">태국법인 관리</span><i class="bi bi-check2"></i></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wt-consumables/')"><span class="sw-badge" style="background:#16a34a">일보</span><span style="flex:1">일일매출보고</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/pm-planner/')"><span class="sw-badge" style="background:#8b5cf6">기획</span><span style="flex:1">상품기획 PM</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/sales-portfolio/')"><span class="sw-badge" style="background:#3f5e7a">PF</span><span style="flex:1">Sales Portfolio</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/demo-schedule/')"><span class="sw-badge" style="background:#2563eb">데모</span><span style="flex:1">데모 일정</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/#app=admin')"><span class="sw-badge" style="background:#6b7280">ADM</span><span style="flex:1">관리자 페이지</span></div>
      </div></div>
  </aside>
  <main id="main"><div id="view"></div></main>
</div>
<div id="mbg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══ 태국법인 종합 ERP — 저장: cons_cache key='corp_th_erp' (팀 공용) ═══
const SB_URL='https://mhfacbsittfdkknwybhc.supabase.co',SB_KEY='sb_publishable_aPMOOWAlyJlMcP1ZM_gpPA_jlrcvCRd';
const _sb=supabase.createClient(SB_URL,SB_KEY);
const CENTRAL='https://wt-management.github.io/wontech/';
const KEY='corp_th_erp', SYM='฿', CUR='THB';
const ORD_ST={'수주':'c-blue','생산중':'c-amber','선적중':'c-cyan','납품완료':'c-green','취소':'c-gray'};
const EXP_CATS=['급여','임차료','물류비','마케팅','출장비','기타'];
let ME='',curView='dash',D=null,LOCAL=false;
const blank=()=>({rate:38,sales:[],orders:[],items:[],moves:[],funds:[],expenses:[]});
const uid=()=>crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.random().toString(16).slice(2);

// ── 부트 ──
async function boot(){const{data}=await _sb.auth.getSession();
  if(data&&data.session)await enter(data.session.user);
  else if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){LOCAL=true;ME='dev@local';D=blank();seedSample(false);ready();}
  else location.href=CENTRAL;}
async function enter(user){ME=user.email||'';
  document.getElementById('uem').textContent=ME;document.getElementById('unm').textContent=ME.split('@')[0]||'사용자';document.getElementById('uav').textContent=(ME[0]||'P').toUpperCase();
  const{data,error}=await _sb.from('cons_cache').select('data').eq('key',KEY).maybeSingle();
  D=(data&&data.data)?Object.assign(blank(),data.data):blank();
  ready();}
function ready(){document.getElementById('boot-ov').style.display='none';document.getElementById('app').style.display='block';render();}
async function saveAll(msg){
  if(LOCAL){render();toast(msg||'저장됨 (로컬)');return;}
  const{error}=await _sb.from('cons_cache').upsert({key:KEY,data:D});
  if(error){toast('저장 실패: '+error.message);return;}
  render();toast(msg||'저장됨');}
async function doLogout(){await _sb.auth.signOut();Object.keys(localStorage).filter(k=>k.startsWith('sb-')).forEach(k=>localStorage.removeItem(k));location.href=CENTRAL;}
async function changePw(){const np=prompt('새 비밀번호 (6자 이상)');if(np===null)return;if((np||'').length<6){alert('6자 이상이어야 합니다.');return;}if(prompt('확인을 위해 다시 입력하세요')!==np){alert('일치하지 않습니다.');return;}const r=await _sb.auth.updateUser({password:np});if(r.error){alert('변경 실패: '+r.error.message);return;}alert('비밀번호가 변경되었습니다.');}
async function goSite(url){try{const{data:{session:s}}=await _sb.auth.getSession();if(s&&url.indexOf('#')<0)url+='#at='+encodeURIComponent(s.access_token)+'&rt='+encodeURIComponent(s.refresh_token);}catch(e){}location.href=url;}
document.addEventListener('click',e=>{const w=document.querySelector('.switch-wrap');if(w&&!w.contains(e.target))document.getElementById('swdd').classList.remove('open');});

// ── 유틸 ──
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function today(){return new Date().toISOString().slice(0,10);}
function ym(d){return String(d||'').slice(0,7);}
function curYm(){return today().slice(0,7);}
function fm(n){n=Number(n)||0;return SYM+n.toLocaleString(undefined,{maximumFractionDigits:0});}
function fkrw(n){const w=(Number(n)||0)*(D.rate||0);if(!w)return'';if(Math.abs(w)>=1e8)return'₩'+(w/1e8).toFixed(1)+'억';if(Math.abs(w)>=1e4)return'₩'+Math.round(w/1e4).toLocaleString()+'만';return'₩'+Math.round(w).toLocaleString();}
function fboth(n){return fm(n)+(D.rate?' <span class="muted" style="font-size:11px">'+fkrw(n)+'</span>':'');}
function monthsOf(arr,f){const s=new Set(arr.map(x=>ym(x[f||'date'])).filter(Boolean));return[...s].sort().reverse();}
function itemQty(name){const it=(D.items||[]).find(i=>i.name===name);let q=it?Number(it.qty0)||0:0;(D.moves||[]).forEach(m=>{if(m.item===name)q+=(m.type==='입고'?1:-1)*(Number(m.qty)||0);});return q;}
function fundsBal(){let b=0;(D.funds||[]).forEach(f=>{b+=(f.kind==='입금'?1:-1)*(Number(f.amt)||0);});return b;}
function ordChip(s){return `<span class="chip ${ORD_ST[s]||'c-gray'}">${esc(s)}</span>`;}

// ── 라우팅 ──
function setView(v){curView=v;document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.v===v));render();window.scrollTo(0,0);}
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>setView(a.dataset.v)));
function render(){const f={dash:vDash,sales:vSales,orders:vOrders,inv:vInv,funds:vFunds,exp:vExp}[curView];document.getElementById('view').innerHTML=f();}
function head(t,d,acts){return `<div class="topbar"><div><h2>${t}</h2><div class="desc">${d}</div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${acts||''}</div></div><div class="wrap">`;}
function isEmpty(){return !(D.sales||[]).length&&!(D.orders||[]).length&&!(D.funds||[]).length&&!(D.items||[]).length;}

// ── 대시보드 ──
function vDash(){
  const cy=curYm();
  const sM=(D.sales||[]).filter(s=>ym(s.date)===cy).reduce((a,s)=>a+(+s.amt||0),0);
  const sY=(D.sales||[]).filter(s=>String(s.date||'').slice(0,4)===cy.slice(0,4)).reduce((a,s)=>a+(+s.amt||0),0);
  const backlog=(D.orders||[]).filter(o=>o.status!=='납품완료'&&o.status!=='취소');
  const backAmt=backlog.reduce((a,o)=>a+(+o.amt||0),0);
  const bal=fundsBal();
  const low=(D.items||[]).filter(i=>itemQty(i.name)<(+i.safety||0));
  const eM=(D.expenses||[]).filter(e=>e.ym===cy).reduce((a,e)=>a+(+e.amt||0),0);
  const kpis=[
    {v:fm(sM),l:'이번달 매출',s:fkrw(sM)},
    {v:fm(sY),l:cy.slice(0,4)+'년 누적 매출',s:fkrw(sY)},
    {v:fm(backAmt),l:'수주 잔고 ('+backlog.length+'건)',s:fkrw(backAmt)},
    {v:fm(bal),l:'자금 잔액',s:fkrw(bal),c:bal<0?'var(--bad)':''},
    {v:low.length+'개',l:'재고 부족 품목',c:low.length?'var(--bad)':''},
    {v:fm(eM),l:'이번달 비용',s:fkrw(eM)},
  ];
  // 최근 12개월 매출 막대
  const ms=[];const now=new Date();for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);ms.push(d.toISOString().slice(0,7));}
  const vals=ms.map(m=>(D.sales||[]).filter(s=>ym(s.date)===m).reduce((a,s)=>a+(+s.amt||0),0));
  const mx=Math.max(1,...vals);

  const lowRows=low.length?low.map(i=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px"><b style="flex:1;color:var(--ink)">${esc(i.name)}</b><span class="dn">재고 ${itemQty(i.name)}${esc(i.unit||'')}</span><span class="muted">안전 ${i.safety||0}</span></div>`).join(''):'<div class="empty" style="color:var(--ok)">부족 품목 없음</div>';
  return head('📊 경영 대시보드','태국법인 매출·수주·물류·자금 종합 현황 · 환율 '+SYM+'1 = ₩'+(D.rate||0).toLocaleString(),
    `<button class="btn btn-sm" onclick="setRate()"><i class="bi bi-currency-exchange"></i> 환율 설정</button>${isEmpty()?'<button class="btn btn-primary" onclick="seedSample(true)">샘플 데이터 넣기</button>':''}`)+
    `<div class="grid kpis">${kpis.map(k=>`<div class="kpi"><div class="v" style="color:${k.c||'var(--ink)'}">${k.v}</div><div class="l">${k.l}</div>${k.s?`<div class="s">${k.s}</div>`:''}</div>`).join('')}</div>
    <div class="card" style="margin-bottom:14px"><div class="sect"><span>📈 월별 매출 (최근 12개월)</span></div><div style="display:flex;gap:4px">${bars}</div></div>
    <div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px">
      <div class="card"><div class="sect"><span>📝 수주 파이프라인</span><span class="muted" style="font-size:12px;cursor:pointer" onclick="setView('orders')">전체 →</span></div><div style="display:flex;gap:6px">${pipe}</div></div>
      <div class="card"><div class="sect"><span>📦 재고 부족 알림</span><span class="muted" style="font-size:12px;cursor:pointer" onclick="setView('inv')">재고 →</span></div>${lowRows}</div></div>
    <div class="card"><div class="sect"><span>🏦 최근 자금 내역</span><span class="muted" style="font-size:12px;cursor:pointer" onclick="setView('funds')">전체 →</span></div>${fRows}</div></div>`;
}

    return `<tr onclick="mItem('${i.id}')"><td class="l"><b style="color:var(--ink)">${esc(i.name)}</b></td><td>${q.toLocaleString()} ${esc(i.unit||'')}</td><td class="muted">${(+i.safety||0).toLocaleString()}</td><td class="l">${low?'<span class="chip c-red">부족</span>':'<span class="chip c-green">정상</span>'}</td></tr>`;}).join(''):'<tr><td colspan="4" class="empty">품목이 없습니다</td></tr>';
  const mv=(D.moves||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,40);

// ── 자금 ──
let fFundYm='';
function vFunds(){

    <div class="fld"><label>금액(${CUR})</label><input id="f-amt" type="number" value="${f.amt||''}"></div>
    <div class="fld"><label>메모</label><input id="f-memo" value="${esc(f.memo||'')}"></div>`,
    async()=>{const g=x=>document.getElementById(x).value;const rec={id:id||uid(),date:g('f-date'),kind:g('f-kind'),account:g('f-acc').trim(),category:g('f-cat').trim(),amt:Number(g('f-amt'))||0,memo:g('f-memo').trim()};
      if(!rec.amt){toast('금액을 입력하세요');return false;}
      const i=(D.funds||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.funds[i]=rec;else D.funds.push(rec);await saveAll();return true;},
    id?async()=>{D.funds=D.funds.filter(x=>x.id!==id);await saveAll('삭제됨');}:null);
}

// ── 비용·인건비 ──
function vExp(){
  const L=(D.expenses||[]).slice().sort((a,b)=>(b.ym||'').localeCompare(a.ym||''));
  const cy=curYm();
  const byCat={};L.filter(e=>e.ym===cy).forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+(+e.amt||0);});
  const mTot=Object.values(byCat).reduce((a,b)=>a+b,0);const mx=Math.max(1,...Object.values(byCat));
  const catBars=EXP_CATS.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:5px 0"><div style="width:70px;font-size:12.5px;font-weight:600">${c}</div><div class="bar" style="flex:1"><i style="width:${(byCat[c]||0)/mx*100}%"></i></div><div style="width:110px;text-align:right;font-size:12px"><b>${fm(byCat[c]||0)}</b></div></div>`).join('');
  const rows=L.length?L.map(e=>`<tr onclick="mExp('${e.id}')"><td class="l">${e.ym}</td><td class="l"><span class="chip c-gray">${esc(e.category)}</span></td><td><b>${fm(e.amt)}</b></td><td class="muted" style="font-size:11.5px">${fkrw(e.amt)}</td><td class="l muted">${esc(e.memo||'')}</td></tr>`).join(''):'<tr><td colspan="5" class="empty">비용 기록이 없습니다</td></tr>';
  return head('🧾 비용 · 인건비','월별 고정비·급여 기록',
    `<button class="btn btn-primary" onclick="mExp()">+ 비용 등록</button>`)+
    `<div class="card" style="margin-bottom:14px"><div class="sect"><span>${cy} 비용 구성</span><b style="color:var(--ink)">${fm(mTot)} <span class="muted" style="font-size:11.5px;font-weight:500">${fkrw(mTot)}</span></b></div>${catBars}</div>
    <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th class="l">월</th><th class="l">분류</th><th>금액(${CUR})</th><th>원화</th><th class="l">메모</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function mExp(id){const e=id?(D.expenses||[]).find(x=>x.id===id):{ym:curYm(),category:'급여',amt:'',memo:''};
  openM((id?'비용 수정':'비용 등록'),`
    <div class="fr"><div class="fld"><label>월</label><input id="f-ym" type="month" value="${e.ym||curYm()}"></div><div class="fld"><label>분류</label><select id="f-cat">${EXP_CATS.map(c=>`<option ${e.category===c?'selected':''}>${c}</option>`).join('')}</select></div></div>
    <div class="fld"><label>금액(${CUR})</label><input id="f-amt" type="number" value="${e.amt||''}"></div>
    <div class="fld"><label>메모</label><input id="f-memo" value="${esc(e.memo||'')}"></div>`,
    async()=>{const g=x=>document.getElementById(x).value;const rec={id:id||uid(),ym:g('f-ym'),category:g('f-cat'),amt:Number(g('f-amt'))||0,memo:g('f-memo').trim()};
      if(!rec.amt){toast('금액을 입력하세요');return false;}
      const i=(D.expenses||[]).findIndex(x=>x.id===rec.id);if(i>=0)D.expenses[i]=rec;else D.expenses.push(rec);await saveAll();return true;},
    id?async()=>{D.expenses=D.expenses.filter(x=>x.id!==id);await saveAll('삭제됨');}:null);
}

// ── 공용 모달 ──
let _onSave=null,_onDel=null;
function openM(title,body,onSave,onDel){_onSave=onSave;_onDel=onDel;
  document.getElementById('modal').innerHTML=`<div class="mh"><h3>${title}</h3><button class="x" onclick="closeM()">×</button></div><div class="mb">${body}</div>
    <div class="mf"><div>${onDel?'<button class="btn" style="color:var(--bad)" onclick="delM()">삭제</button>':''}</div><div><button class="btn" onclick="closeM()">취소</button><button class="btn btn-primary" onclick="saveM()">저장</button></div></div>`;
  document.getElementById('mbg').style.display='flex';}
function closeM(){document.getElementById('mbg').style.display='none';}
async function saveM(){if(_onSave&&await _onSave()!==false)closeM();}
async function delM(){if(!confirm('삭제할까요?'))return;if(_onDel)await _onDel();closeM();}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeM();});
